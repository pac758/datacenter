<script>
// ---- เชื่อม app-main เดิม กับ Dashboard Shell ----
(function patchLayout(){
  // รอให้ DOM พร้อม
  document.addEventListener('DOMContentLoaded', function() {

    // ย้าย .app-main เข้าไปอยู่ใน #dbMain
    var appMain = document.querySelector('.app-main');
    var dbMain  = document.getElementById('dbMain');

    if (appMain && dbMain) {
      // ซ่อน .app-main ก่อน (Dashboard จะเปิดแทน)
      appMain.style.display = 'none';

      // ย้าย appMain เข้า dbMain ต่อท้าย db-content
      var dbContent = dbMain.querySelector('.db-content');
      if (dbContent) {
        dbMain.insertBefore(appMain, dbContent.nextSibling);
      } else {
        dbMain.appendChild(appMain);
      }
    }

    // ซ่อน app-sidebar เดิม (ใช้ db-sidebar ใหม่แทน)
    var oldSidebar = document.querySelector('.app-sidebar');
    if (oldSidebar) oldSidebar.style.display = 'none';

    // ซ่อน header เดิมที่อยู่ใน app-main ถ้ามี
    var oldHeader = document.querySelector('.app-main .header');
    if (oldHeader) oldHeader.style.display = 'none';

    // ซ่อน .app-shell wrapper แต่ไม่ซ่อน content ข้างใน
    var appShell = document.querySelector('.app-shell');
    if (appShell) {
      appShell.style.display = 'flex';
      appShell.style.padding = '0';
      appShell.style.background = 'transparent';
    }

    console.log('✅ Dashboard layout patched');
  });
})();
</script>
