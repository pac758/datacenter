<style>

<script>
// =============================================================
// VIEW MODAL RENDERER - ULTRA COMPACT v16.2
// =============================================================

function renderViewModalCompact(doc, downloadFiles) {
  if (!doc) return '<p style="text-align:center;color:#999;padding:20px;">ไม่พบข้อมูล</p>';

  // สร้าง map ของ download URLs จาก backend (ถ้ามี)
  var dlMap = {};
  if (downloadFiles && Array.isArray(downloadFiles)) {
    downloadFiles.forEach(function(f) {
      if (f.fileId) dlMap[f.fileId] = f.downloadUrl;
    });
  }

  var h = '';

  // --- Title (ชิดซ้าย เล็กลง) ---
  h += '<div class="vmc-title">' + esc_(doc.title || 'ไม่ระบุชื่อ') + '</div>';

  // --- Badge + Metadata ในกล่องเดียว ---
  h += '<div class="vmc-inline-info">';

  if (doc.document_type) {
    h += '<span class="vmc-badge">' + esc_(doc.document_type) + '</span>';
  }

  if (doc.category) {
    h += '<span class="vmc-meta-text"><i class="fas fa-folder"></i><b>' + esc_(doc.category) + '</b></span>';
  }

  if (doc.document_date) {
    h += '<span class="vmc-sep">&bull;</span>';
    h += '<span class="vmc-meta-text"><i class="fas fa-calendar"></i>' + esc_(doc.document_date) + '</span>';
  }

  if (doc.submitter_name) {
    h += '<span class="vmc-sep">&bull;</span>';
    h += '<span class="vmc-meta-text"><i class="fas fa-user"></i>' + esc_(doc.submitter_name) + '</span>';
  }

  if (doc.timestamp) {
    h += '<span class="vmc-sep">&bull;</span>';
    h += '<span class="vmc-meta-text" style="color:#94a3b8;font-size:10px;"><i class="fas fa-clock"></i>' + esc_(doc.timestamp) + '</span>';
  }

  h += '</div>';

  // --- Tags ---
  if (doc.tags && doc.tags.trim()) {
    var tags = doc.tags.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
    if (tags.length) {
      h += '<div class="vmc-tags">';
      tags.forEach(function(t) {
        h += '<span class="vmc-tag">#' + esc_(t) + '</span>';
      });
      h += '</div>';
    }
  }

  // --- Description ---
  if (doc.description && doc.description.trim()) {
    h += '<div class="vmc-desc">' + esc_(doc.description) + '</div>';
  }

  // --- File List ---
  var files = pf_(doc.file_objects_json);
  // ถ้ามี downloadFiles จาก backend ให้ใช้แทน (สิทธิ์ถูกตั้งแล้ว)
  var useBackendFiles = (downloadFiles && downloadFiles.length > 0);
  var fileCount = useBackendFiles ? downloadFiles.length : files.length;

  if (fileCount > 0) {
    h += '<div class="vmc-files-header"><i class="fas fa-paperclip"></i> ไฟล์แนบ (' + fileCount + '):</div>';

    // ปุ่มดาวน์โหลดทั้งหมด
    if (fileCount > 1) {
      h += '<button class="vmc-download-all" onclick="downloadAllFilesSequential(' + doc.id + ')">';
      h += '<i class="fas fa-download"></i> ดาวน์โหลดทั้งหมด (' + fileCount + ' ไฟล์)';
      h += '</button>';
    }
    h += '<div id="vmcDlStatus" class="vmc-dl-status"></div>';

    // === GRID THUMBNAILS (Google Drive Style) ===
    h += '<div class="vmc-thumb-grid">';

    var allFiles = [];
    if (useBackendFiles) {
      downloadFiles.forEach(function(f, i) {
        allFiles.push({
          url: f.viewUrl || f.downloadUrl || '#',
          name: f.fileName || ('ไฟล์ ' + (i + 1)),
          ext: gex_(f.fileName || '')
        });
      });
    } else {
      files.forEach(function(f, i) {
        var url = f.url || f.fileUrl || '#';
        var name = f.name || f.fileName || efn_(url) || ('ไฟล์ ' + (i + 1));
        allFiles.push({ url: url, name: name, ext: gex_(name) });
      });
    }

    allFiles.forEach(function(af, i) {
      var fid = extractDriveId_(af.url);
      var thumbUrl = fid ? 'https://drive.google.com/thumbnail?id=' + fid + '&sz=w300' : '';
      var badgeClass = getBadgeClass_(af.ext);
      var safeUrl = esc_(af.url).replace(/'/g, "\\'");
      var safeName = esc_(af.name).replace(/'/g, "\\'");

      h += '<div class="vmc-thumb-card" onclick="openFullPreview(\'' + safeUrl + '\', \'' + safeName + '\')">';

      // Thumbnail image area
      h += '<div class="vmc-thumb-img">';
      if (thumbUrl) {
        h += '<img src="' + thumbUrl + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';" loading="lazy">';
        h += '<div class="vmc-thumb-icon" style="display:none;">' + gic_(af.ext).e + '</div>';
      } else {
        h += '<div class="vmc-thumb-icon">' + gic_(af.ext).e + '</div>';
      }

      // File type badge
      h += '<span class="vmc-thumb-badge ' + badgeClass + '">' + (af.ext || 'file').toUpperCase() + '</span>';

      // Action buttons (hover overlay)
      h += '<div class="vmc-thumb-actions">';
      h += '<button class="vmc-act-view" onclick="event.stopPropagation(); openFullPreview(\'' + safeUrl + '\', \'' + safeName + '\')"><i class="fas fa-eye"></i> ดู</button>';
      h += '<button class="vmc-act-dl" onclick="event.stopPropagation(); openOrDownloadFile(\'' + safeUrl + '\', \'' + safeName + '\')"><i class="fas fa-download"></i> โหลด</button>';
      h += '</div>';

      h += '</div>'; // end vmc-thumb-img

      // File name
      h += '<div class="vmc-thumb-name" title="' + esc_(af.name) + '">' + esc_(af.name) + '</div>';

      h += '</div>'; // end vmc-thumb-card
    });

    h += '</div>'; // end vmc-thumb-grid

    // Full Preview Area (ซ่อนไว้ กดที่ thumbnail แล้วจะแสดง)
    h += '<div class="vmc-fullpreview" id="vmcFullPreview">';
    h += '<div class="vmc-fullpreview-header">';
    h += '<span id="vmcPreviewTitle">ตัวอย่างไฟล์</span>';
    h += '<button class="vmc-fullpreview-close" onclick="closeFullPreview()">&times;</button>';
    h += '</div>';
    h += '<div class="vmc-fullpreview-body" id="vmcPreviewBody"></div>';
    h += '</div>';
  }

  return h;
}

// =============================================================
// GRID THUMBNAIL FUNCTIONS
// =============================================================

/**
 * เปิด Full Preview เมื่อกดที่ thumbnail card
 */
function openFullPreview(url, name) {
  var previewEl = document.getElementById('vmcFullPreview');
  var bodyEl = document.getElementById('vmcPreviewBody');
  var titleEl = document.getElementById('vmcPreviewTitle');
  if (!previewEl || !bodyEl) return;

  previewEl.classList.add('active');
  if (titleEl) titleEl.textContent = name;

  var ext = (name || '').split('.').pop().toLowerCase();
  var driveId = extractDriveId_(url);

  // PDF, Doc, Excel, PPT → Google Drive preview iframe
  var driveExts = ['pdf','doc','docx','xls','xlsx','ppt','pptx','csv'];
  if (driveId && driveExts.indexOf(ext) >= 0) {
    bodyEl.innerHTML = '<iframe src="https://drive.google.com/file/d/' + driveId + '/preview" allow="autoplay"></iframe>';
    previewEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return;
  }

  // รูปภาพ → Google Drive preview iframe (รวดเร็ว ไม่มี Chrome block)
  var imgExts = ['jpg','jpeg','png','gif','webp','bmp','svg'];
  if (driveId && imgExts.indexOf(ext) >= 0) {
    bodyEl.innerHTML = '<iframe src="https://drive.google.com/file/d/' + driveId + '/preview" allow="autoplay"></iframe>';
    previewEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return;
  }

  // ไฟล์อื่นๆ → ลอง Drive iframe
  if (driveId) {
    bodyEl.innerHTML = '<iframe src="https://drive.google.com/file/d/' + driveId + '/preview" allow="autoplay"></iframe>';
  } else {
    bodyEl.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8;"><i class="fas fa-file" style="font-size:28px;display:block;margin-bottom:8px;"></i>ไม่สามารถแสดงตัวอย่างได้<br><br><button onclick="openOrDownloadFile(\'' + esc_(url).replace(/'/g, "\\'") + '\', \'' + esc_(name).replace(/'/g, "\\'") + '\')" style="padding:8px 20px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;">ดาวน์โหลดไฟล์</button></div>';
  }
  previewEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/**
 * ปิด Full Preview
 */
function closeFullPreview() {
  var el = document.getElementById('vmcFullPreview');
  if (el) el.classList.remove('active');
}

/**
 * คืน CSS class สำหรับ badge ตามนามสกุลไฟล์
 */
function getBadgeClass_(ext) {
  if (ext === 'pdf') return 'pdf';
  if (['doc','docx'].indexOf(ext) >= 0) return 'doc';
  if (['xls','xlsx','csv'].indexOf(ext) >= 0) return 'xls';
  if (['ppt','pptx'].indexOf(ext) >= 0) return 'ppt';
  if (['jpg','jpeg','png','gif','webp','bmp','svg'].indexOf(ext) >= 0) return 'img';
  if (['mp4','mov','mp3','wav'].indexOf(ext) >= 0) return 'vid';
  return 'other';
}

/**
 * ดึง Google Drive File ID จาก URL
 */
function extractDriveId_(url) {
  if (!url) return null;
  var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (!m) m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (!m) m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

// --- Helpers ---
function esc_(t) {
  if (!t) return '';
  var d = document.createElement('div');
  d.textContent = String(t);
  return d.innerHTML;
}

function pf_(json) {
  if (!json) return [];
  var s = String(json).trim();
  if (!s || s === '[]') return [];
  try {
    var p = JSON.parse(s);
    if (Array.isArray(p)) return p;
    if (typeof p === 'object') return [p];
  } catch (e) {}
  var urls = s.match(/https?:\/\/[^\s,\]"]+/g);
  if (urls) return urls.map(function(u) { return { url: u, name: efn_(u) }; });
  return [];
}

function efn_(url) {
  if (!url) return '';
  try {
    var c = url.split('?')[0].split('#')[0];
    var p = c.split('/');
    var l = decodeURIComponent(p[p.length - 1] || '');
    if (l && l.includes('.')) return l;
    if (url.includes('drive.google.com')) return 'Google Drive File';
    return l || 'ไฟล์';
  } catch (e) { return 'ไฟล์'; }
}

function gex_(n) {
  if (!n) return '';
  return (n.split('.').pop() || '').toLowerCase();
}

function gic_(ext) {
  var m = {
    'pdf':  { e:'📕', c:'pdf' },
    'doc':  { e:'📘', c:'doc' }, 'docx': { e:'📘', c:'doc' },
    'xls':  { e:'📗', c:'xls' }, 'xlsx': { e:'📗', c:'xls' }, 'csv': { e:'📊', c:'xls' },
    'ppt':  { e:'📙', c:'ppt' }, 'pptx': { e:'📙', c:'ppt' },
    'jpg':  { e:'🖼️', c:'img' }, 'jpeg': { e:'🖼️', c:'img' }, 'png': { e:'🖼️', c:'img' },
    'gif':  { e:'🖼️', c:'img' }, 'webp': { e:'🖼️', c:'img' },
    'mp4':  { e:'🎬', c:'vid' }, 'mov':  { e:'🎬', c:'vid' },
    'mp3':  { e:'🎵', c:'vid' }, 'wav':  { e:'🎵', c:'vid' },
    'zip':  { e:'📦', c:'' },    'rar':  { e:'📦', c:'' },
    'txt':  { e:'📝', c:'' }
  };
  return m[ext] || { e:'📄', c:'' };
}

/**
 * แปลง Google Drive URL เป็น Direct Download URL
 */
function gdl_(url) {
  if (!url) return '#';
  try {
    // ดึง File ID จาก Google Drive URL
    var match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (!match) match = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (!match) match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    
    if (match && match[1]) {
      return 'https://drive.google.com/uc?export=download&id=' + match[1];
    }
    // ถ้าไม่ใช่ Google Drive URL ให้คืน URL เดิม
    return url;
  } catch (e) {
    return url;
  }
}

/**
 * ดาวน์โหลดไฟล์เดี่ยวจาก URL
 */
function downloadSingleFile(url, fileName) {
  if (!url) return;
  var dlUrl = gdl_(url);
  
  var link = document.createElement('a');
  link.href = dlUrl;
  link.target = '_blank';
  link.rel = 'noopener noreferrer';
  if (fileName) link.download = fileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

/**
 * ดาวน์โหลดไฟล์ทั้งหมดทีละไฟล์ (ป้องกัน popup blocker)
 */
function downloadAllFilesSequential(docId) {
  var statusEl = document.getElementById('vmcDlStatus');
  if (statusEl) {
    statusEl.className = 'vmc-dl-status active';
    statusEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังเตรียมดาวน์โหลด...';
  }
  
  google.script.run
    .withSuccessHandler(function(result) {
      if (!result || !result.success || !result.files || result.files.length === 0) {
        if (statusEl) {
          statusEl.innerHTML = '<i class="fas fa-exclamation-circle" style="color:#ef4444;"></i> ไม่พบไฟล์สำหรับดาวน์โหลด';
        }
        return;
      }
      
      var files = result.files;
      var idx = 0;
      
      function dlNext() {
        if (idx >= files.length) {
          if (statusEl) {
            statusEl.innerHTML = '<i class="fas fa-check-circle"></i> ดาวน์โหลดครบ ' + files.length + ' ไฟล์แล้ว';
            setTimeout(function() { statusEl.className = 'vmc-dl-status'; }, 3000);
          }
          return;
        }
        
        var f = files[idx];
        if (statusEl) {
          statusEl.innerHTML = '<i class="fas fa-download"></i> กำลังดาวน์โหลด ' + (idx + 1) + '/' + files.length + ': ' + esc_(f.fileName);
        }
        
        var link = document.createElement('a');
        link.href = f.downloadUrl;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        idx++;
        setTimeout(dlNext, 1500);
      }
      
      dlNext();
    })
    .withFailureHandler(function(err) {
      if (statusEl) {
        statusEl.innerHTML = '<i class="fas fa-exclamation-circle" style="color:#ef4444;"></i> เกิดข้อผิดพลาด: ' + (err.message || err);
      }
    })
    .getDocumentDownloadLinks(docId);
}

</script>
