<!-- ===== ViewModal_Fix.html - v16.3 ULTRA COMPACT ===== -->
<!-- ✅ ย่อ Modal Header "รายละเอียดเอกสาร" ให้เล็กลง -->
<!-- ✅ ลดพื้นที่ส่วนหัว+metadata ให้เหลือน้อยที่สุดบนมือถือ -->
<!-- ✅ ชื่อไฟล์แนบแสดงเต็ม ไม่ถูกตัด -->
<!-- ✅ แต่ละไฟล์กะทัดรัดขึ้น ประหยัดพื้นที่ -->

<style>
/* =============================================================
   VIEW MODAL - ULTRA COMPACT v16.3
   ============================================================= */

/* --- Modal Header: ย่อให้เล็กลง --- */
#viewModal .modal-header {
  padding: 10px 16px;
}

#viewModal .modal-header h2 {
  font-size: 15px;
  font-weight: 700;
}

#viewModal .close-modal {
  width: 32px;
  height: 32px;
  font-size: 20px;
}

@media (max-width: 768px) {
  #viewModal .modal-header {
    padding: 8px 12px;
  }

  #viewModal .modal-header h2 {
    font-size: 14px;
  }

  #viewModal .close-modal {
    width: 30px;
    height: 30px;
    font-size: 18px;
  }
}

/* --- Title: เล็กลง ชิดซ้าย --- */
.vmc-title {
  font-size: 16px;
  font-weight: 700;
  color: #1e293b;
  line-height: 1.35;
  word-break: break-word;
  margin: 0 0 4px 0;
}

/* --- Badge + Meta รวมแถวเดียว --- */
.vmc-inline-info {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px 6px;
  margin-bottom: 8px;
  padding: 6px 10px;
  background: #f8fafc;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
}

.vmc-badge {
  display: inline-block;
  padding: 1px 8px;
  background: #ede9fe;
  color: #7c3aed;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

.vmc-sep {
  color: #cbd5e1;
  font-size: 10px;
  flex-shrink: 0;
}

.vmc-meta-text {
  font-size: 12px;
  color: #64748b;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
}

.vmc-meta-text i {
  font-size: 10px;
  color: #94a3b8;
}

.vmc-meta-text b {
  color: #334155;
  font-weight: 600;
}

/* --- Tags inline เล็กๆ --- */
.vmc-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-bottom: 6px;
}

.vmc-tag {
  padding: 1px 6px;
  background: #dbeafe;
  color: #1e40af;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
}

/* --- Description กะทัดรัด --- */
.vmc-desc {
  padding: 6px 10px;
  background: #fffbeb;
  border-left: 3px solid #f59e0b;
  border-radius: 4px;
  font-size: 12px;
  color: #92400e;
  margin-bottom: 8px;
  word-break: break-word;
  line-height: 1.4;
}

/* =============================================================
   FILE LIST - COMPACT
   ============================================================= */
.vmc-files-header {
  font-size: 13px;
  font-weight: 700;
  color: #1e293b;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.vmc-files-header i {
  color: #667eea;
}

.vmc-file-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* แต่ละไฟล์ */
.vmc-file {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  text-decoration: none;
  color: inherit;
  transition: background 0.15s;
  min-height: 40px;
}

.vmc-file:hover {
  background: #f0f4ff;
  border-color: #c7d2fe;
}

.vmc-file:active {
  transform: scale(0.98);
}

/* ไอคอนไฟล์ เล็กลง */
.vmc-ficon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.vmc-ficon.pdf { background: #fee2e2; }
.vmc-ficon.doc { background: #dbeafe; }
.vmc-ficon.xls { background: #d1fae5; }
.vmc-ficon.ppt { background: #fef3c7; }
.vmc-ficon.img { background: #ede9fe; }
.vmc-ficon.vid { background: #fce7f3; }

/* ชื่อไฟล์ - แสดงเต็ม! */
.vmc-fname {
  flex: 1;
  min-width: 0;
  font-size: 12.5px;
  font-weight: 600;
  color: #1e293b;
  line-height: 1.3;
  word-break: break-all;
  overflow-wrap: break-word;
}

.vmc-fnum {
  font-size: 10px;
  color: #94a3b8;
  font-weight: 400;
}

/* ปุ่มเปิด เล็กลง */
.vmc-fopen {
  flex-shrink: 0;
  padding: 4px 10px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
  text-decoration: none;
}

/* =============================================================
   MOBILE: ยิ่งกะทัดรัดขึ้น
   ============================================================= */
@media (max-width: 768px) {
  #viewModalBody {
    padding: 10px 12px !important;
  }

  .vmc-title {
    font-size: 15px;
  }

  .vmc-inline-info {
    padding: 5px 8px;
    gap: 3px 5px;
  }

  .vmc-badge {
    font-size: 10px;
    padding: 0px 6px;
  }

  .vmc-meta-text {
    font-size: 11px;
  }

  .vmc-file {
    padding: 6px 8px;
    gap: 6px;
    min-height: 36px;
  }

  .vmc-ficon {
    width: 24px;
    height: 24px;
    font-size: 12px;
    border-radius: 5px;
  }

  .vmc-fname {
    font-size: 12px;
  }

  .vmc-fopen {
    padding: 3px 8px;
    font-size: 10px;
    border-radius: 5px;
  }
}

/* ===== Override สไตล์เดิมที่ตัดชื่อไฟล์ ===== */
#viewModalBody .file-name,
#viewModalBody .file-item-name,
#viewModalBody .attachment-name,
#viewModalBody [class*="file"] [class*="name"] {
  white-space: normal !important;
  overflow: visible !important;
  text-overflow: unset !important;
  word-break: break-all !important;
  overflow-wrap: break-word !important;
  -webkit-line-clamp: unset !important;
  display: block !important;
}
</style>

<script>
// =============================================================
// VIEW MODAL RENDERER - ULTRA COMPACT v16.2
// =============================================================

function renderViewModalCompact(doc) {
  if (!doc) return '<p style="text-align:center;color:#999;padding:20px;">ไม่พบข้อมูล</p>';

  var h = '';

  // --- Title (ชิดซ้าย เล็กลง) ---
  h += '<div class="vmc-title">' + esc_(doc.title || 'ไม่ระบุชื่อ') + '</div>';

  // --- Badge + Metadata ในกล่องเดียว ---
  h += '<div class="vmc-inline-info">';

  if (doc.document_type) {
    h += '<span class="vmc-badge">' + esc_(doc.document_type) + '</span>';
  }

  if (doc.category) {
    h += '<span class="vmc-meta-text"><i class="fas fa-folder"></i><b>' + esc_(doc.category) + '</b></span>';
  }

  if (doc.document_date) {
    h += '<span class="vmc-sep">&bull;</span>';
    h += '<span class="vmc-meta-text"><i class="fas fa-calendar"></i>' + esc_(doc.document_date) + '</span>';
  }

  if (doc.submitter_name) {
    h += '<span class="vmc-sep">&bull;</span>';
    h += '<span class="vmc-meta-text"><i class="fas fa-user"></i>' + esc_(doc.submitter_name) + '</span>';
  }

  if (doc.timestamp) {
    h += '<span class="vmc-sep">&bull;</span>';
    h += '<span class="vmc-meta-text" style="color:#94a3b8;font-size:10px;"><i class="fas fa-clock"></i>' + esc_(doc.timestamp) + '</span>';
  }

  h += '</div>';

  // --- Tags ---
  if (doc.tags && doc.tags.trim()) {
    var tags = doc.tags.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
    if (tags.length) {
      h += '<div class="vmc-tags">';
      tags.forEach(function(t) {
        h += '<span class="vmc-tag">#' + esc_(t) + '</span>';
      });
      h += '</div>';
    }
  }

  // --- Description ---
  if (doc.description && doc.description.trim()) {
    h += '<div class="vmc-desc">' + esc_(doc.description) + '</div>';
  }

  // --- File List ---
  var files = pf_(doc.file_objects_json);
  if (files.length > 0) {
    h += '<div class="vmc-files-header"><i class="fas fa-paperclip"></i> ไฟล์แนบ (' + files.length + '):</div>';
    h += '<div class="vmc-file-list">';

    files.forEach(function(f, i) {
      var url = f.url || f.fileUrl || '#';
      var name = f.name || f.fileName || efn_(url) || ('ไฟล์ ' + (i + 1));
      var ext = gex_(name);
      var ic = gic_(ext);

      h += '<a href="' + esc_(url) + '" target="_blank" rel="noopener" class="vmc-file">';
      h += '<div class="vmc-ficon ' + ic.c + '">' + ic.e + '</div>';
      h += '<div class="vmc-fname">' + esc_(name) + ' <span class="vmc-fnum">' + (i + 1) + '/' + files.length + '</span></div>';
      h += '<span class="vmc-fopen"><i class="fas fa-external-link-alt"></i> เปิด</span>';
      h += '</a>';
    });

    h += '</div>';
  }

  return h;
}

// --- Helpers ---
function esc_(t) {
  if (!t) return '';
  var d = document.createElement('div');
  d.textContent = String(t);
  return d.innerHTML;
}

function pf_(json) {
  if (!json) return [];
  var s = String(json).trim();
  if (!s || s === '[]') return [];
  try {
    var p = JSON.parse(s);
    if (Array.isArray(p)) return p;
    if (typeof p === 'object') return [p];
  } catch (e) {}
  var urls = s.match(/https?:\/\/[^\s,\]"]+/g);
  if (urls) return urls.map(function(u) { return { url: u, name: efn_(u) }; });
  return [];
}

function efn_(url) {
  if (!url) return '';
  try {
    var c = url.split('?')[0].split('#')[0];
    var p = c.split('/');
    var l = decodeURIComponent(p[p.length - 1] || '');
    if (l && l.includes('.')) return l;
    if (url.includes('drive.google.com')) return 'Google Drive File';
    return l || 'ไฟล์';
  } catch (e) { return 'ไฟล์'; }
}

function gex_(n) {
  if (!n) return '';
  return (n.split('.').pop() || '').toLowerCase();
}

function gic_(ext) {
  var m = {
    'pdf':  { e:'📕', c:'pdf' },
    'doc':  { e:'📘', c:'doc' }, 'docx': { e:'📘', c:'doc' },
    'xls':  { e:'📗', c:'xls' }, 'xlsx': { e:'📗', c:'xls' }, 'csv': { e:'📊', c:'xls' },
    'ppt':  { e:'📙', c:'ppt' }, 'pptx': { e:'📙', c:'ppt' },
    'jpg':  { e:'🖼️', c:'img' }, 'jpeg': { e:'🖼️', c:'img' }, 'png': { e:'🖼️', c:'img' },
    'gif':  { e:'🖼️', c:'img' }, 'webp': { e:'🖼️', c:'img' },
    'mp4':  { e:'🎬', c:'vid' }, 'mov':  { e:'🎬', c:'vid' },
    'mp3':  { e:'🎵', c:'vid' }, 'wav':  { e:'🎵', c:'vid' },
    'zip':  { e:'📦', c:'' },    'rar':  { e:'📦', c:'' },
    'txt':  { e:'📝', c:'' }
  };
  return m[ext] || { e:'📄', c:'' };
}

// =============================================================
// OVERRIDE viewDocument
// =============================================================
(function() {
  var _orig = window.viewDocument;

  window.viewDocument = function(id) {
    var modal = document.getElementById('viewModal');
    var body = document.getElementById('viewModalBody');
    if (!modal || !body) {
      if (_orig) return _orig(id);
      return;
    }

    body.innerHTML = '<div style="text-align:center;padding:30px;"><div class="spinner" style="margin:0 auto 10px;width:32px;height:32px;border-width:3px;"></div><p style="color:#94a3b8;font-size:13px;">กำลังโหลด...</p></div>';

    if (typeof openModal === 'function') {
      openModal('viewModal');
    } else {
      modal.style.display = 'flex';
      modal.classList.add('active');
    }

    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success && r.data) {
          body.innerHTML = renderViewModalCompact(r.data);
        } else {
          body.innerHTML = '<div style="text-align:center;padding:30px;color:#ef4444;"><i class="fas fa-exclamation-triangle" style="font-size:24px;display:block;margin-bottom:8px;"></i>ไม่พบข้อมูล</div>';
        }
      })
      .withFailureHandler(function(err) {
        body.innerHTML = '<div style="text-align:center;padding:30px;color:#ef4444;">เกิดข้อผิดพลาด</div>';
      })
      .getDocumentById(id);
  };
})();
</script>
