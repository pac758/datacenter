<!-- ===== NewContent.html - Modern SaaS Dashboard Layout ===== -->

<!-- Mobile Topbar -->
<header class="m-topbar">
  <button id="btnToggleFilters" class="m-icon-btn" aria-label="ตัวกรอง">
    <i class="fa-solid fa-sliders"></i>
  </button>
  <div class="m-title">
    <span>ศูนย์ข้อมูล รร.บ้านโคกยางหนองถนน</span>
  </div>
  <a href="https://drive.google.com/drive/folders/1SkiPR0RFqBAyQohk3hEAY2TuxUxRDuNC" 
     target="_blank" 
     rel="noopener noreferrer"
     class="m-icon-btn" 
     aria-label="เปิดโฟลเดอร์"
     style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
    <i class="fa-solid fa-folder-open"></i>
  </a>
  <button id="btnOpenAdd" class="m-icon-btn" aria-label="เพิ่มเอกสาร">
    <i class="fa-regular fa-square-plus"></i>
  </button>
</header>

<!-- Bottom Navigation (เฉพาะมือถือ) -->
<nav class="m-bottom-nav" role="navigation" aria-label="เมนูด้านล่าง">
  <button class="m-nav-btn" id="navSearch"><i class="fa-solid fa-magnifying-glass"></i><span>ค้นหา</span></button>
  <button class="m-nav-btn" id="navGForm" onclick="openGoogleForm()"><i class="fab fa-google"></i><span>G Form</span></button>
  <button class="m-nav-btn m-nav-main" id="navAdd"><i class="fa-regular fa-square-plus"></i><span>เพิ่ม</span></button>
  <button class="m-nav-btn" id="navSettings" onclick="openSettingsModal()"><i class="fa-solid fa-gear"></i><span>ตั้งค่า</span></button>
</nav>

<!-- ===== Main Content ===== -->
<div class="app-shell">
  <aside class="app-sidebar" aria-label="เมนูด้านข้าง">
    <div class="app-sidebar-header">
      <div class="app-sidebar-brand">
        <div class="app-sidebar-logo">🏫</div>
        <div class="app-sidebar-brand-text">
          <div class="app-sidebar-title">Data Center</div>
          <div class="app-sidebar-subtitle">ร.ร.บ้านโคกยางหนองถนน</div>
        </div>
      </div>
    </div>

    <div class="app-sidebar-section">
      <button class="app-sidebar-btn primary" onclick="openModal('addModal')">
        <i class="fas fa-plus"></i>
        <span>เพิ่มเอกสาร</span>
      </button>
    </div>

    <div class="app-sidebar-section">
      <a class="app-sidebar-btn" href="https://drive.google.com/drive/folders/1SkiPR0RFqBAyQohk3hEAY2TuxUxRDuNC" target="_blank" rel="noopener noreferrer">
        <i class="fa-solid fa-folder-open"></i>
        <span>เปิดโฟลเดอร์</span>
      </a>

      <button class="app-sidebar-btn" onclick="openGoogleForm()">
        <i class="fab fa-google"></i>
        <span>เพิ่มผ่าน G Form</span>
      </button>

      <button class="app-sidebar-btn" onclick="openAdminModal()">
        <i class="fas fa-cog"></i>
        <span>ตั้งค่าระบบ</span>
      </button>
    </div>

    <div class="app-sidebar-footer">
      <div class="app-sidebar-hint">Tip: ใช้ช่องค้นหาด้านบนเพื่อค้นหาเอกสาร</div>
    </div>
  </aside>

  <main class="app-main">
    <div class="container">
      <!-- Header -->
      <div class="app-header">
        <h1>ระบบศูนย์กลางข้อมูล โรงเรียนบ้านโคกยางหนองถนน</h1>
        <p>© 2568 @pthk — Designed & Developed for RKT School V16</p>
        <div class="header-icon">
          <img id="schoolLogo" 
               src="" 
               alt="โลโก้โรงเรียนบ้านโคกยางหนองถนน" 
               style="display: none;">
          <div id="logoPlaceholder" style="font-size: 64px;">🏫</div>
        </div>
      </div>
    </div>
    
    <!-- Statistics -->
    <div class="app-stats" id="statsContainer">
      <div class="app-stat-card">
        <div class="icon">📊</div>
        <div class="stat-content">
          <p class="value" id="totalDocs">0</p>
          <h3>เอกสารทั้งหมด</h3>
        </div>
      </div>
      <div class="app-stat-card">
        <div class="icon">📅</div>
        <div class="stat-content">
          <p class="value" id="todayDocs">0</p>
          <h3>เอกสารวันนี้</h3>
        </div>
      </div>
      <div class="app-stat-card">
        <div class="icon">📁</div>
        <div class="stat-content">
          <p class="value" id="categoriesCount">0</p>
          <h3>หมวดหมู่</h3>
        </div>
      </div>
      <div class="app-stat-card">
        <div class="icon">👥</div>
        <div class="stat-content">
          <p class="value" id="submittersCount">0</p>
          <h3>ผู้ส่ง</h3>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="app-controls">
      <div class="controls-row">
        <div class="search-box" style="position: relative;">
          <input type="text" id="searchInput" placeholder="ค้นหาเอกสาร ชื่อ, ผู้ส่ง, หมายเหตุ...">
          <i class="fas fa-search" style="right: 14px;"></i>
          <button id="clearSearchBtn" onclick="clearSearch()" style="
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 16px;
            padding: 8px;
            display: none;
            transition: all 0.2s;
          ">
            <i class="fas fa-times-circle"></i>
          </button>
        </div>
        
        <select id="categoryFilter" class="filter-select">
          <option value="">📁 ทุกหมวดหมู่</option>
        </select>
        
        <select id="typeFilter" class="filter-select">
          <option value="">📄 ทุกประเภท</option>
        </select>
        
        <!-- Advanced Filter Button -->
        <button class="btn-filter" id="btnAdvancedFilter" onclick="toggleAdvancedFilters()">
          <i class="fas fa-filter"></i>
          <span>ตัวกรองเพิ่มเติม</span>
          <span class="filter-count" id="filterCount" style="display:none;">0</span>
        </button>
        
        <div class="view-controls">
          <button class="view-btn" id="gridViewBtn" onclick="switchView('grid')">
            <i class="fas fa-th"></i> การ์ด
          </button>
          <button class="view-btn active" id="listViewBtn" onclick="switchView('list')">
            <i class="fas fa-list"></i> รายการ
          </button>
        </div>
      </div>
      
      <!-- Advanced Filter Panel -->
      <div id="advancedFilterPanel" class="advanced-filter-panel" style="display:none;">
        <div class="filter-grid">
          <!-- Date Filter -->
          <div class="filter-group full-width">
            <label class="filter-label">
              <i class="fas fa-calendar-alt"></i> กรองตามวันที่
            </label>
            <select id="dateFilterType" class="filter-input" onchange="handleDateFilterTypeChange()">
              <option value="all">ทั้งหมด</option>
              <option value="quick">เลือกด่วน</option>
              <option value="month-year">เดือน-ปี</option>
              <option value="custom">กำหนดเอง</option>
            </select>
            
            <select id="quickDatePreset" class="filter-input" style="display:none; margin-top:8px;" onchange="applyQuickDatePreset()">
              <option value="">เลือกช่วงเวลา</option>
              <option value="today">วันนี้</option>
              <option value="week">สัปดาห์นี้</option>
              <option value="month">เดือนนี้</option>
              <option value="year">ปีนี้</option>
            </select>
            
            <div id="monthYearSelectors" style="display:none; margin-top:8px; display:grid; grid-template-columns:1fr 1fr; gap:8px;">
              <select id="monthFilter" class="filter-input" onchange="applyMonthYearFilter()">
                <option value="">เลือกเดือน</option>
                <option value="1">มกราคม</option>
                <option value="2">กุมภาพันธ์</option>
                <option value="3">มีนาคม</option>
                <option value="4">เมษายน</option>
                <option value="5">พฤษภาคม</option>
                <option value="6">มิถุนายน</option>
                <option value="7">กรกฎาคม</option>
                <option value="8">สิงหาคม</option>
                <option value="9">กันยายน</option>
                <option value="10">ตุลาคม</option>
                <option value="11">พฤศจิกายน</option>
                <option value="12">ธันวาคม</option>
              </select>
              <select id="yearFilter" class="filter-input" onchange="applyMonthYearFilter()">
                <option value="">เลือกปี</option>
              </select>
            </div>
            
            <div id="customDateInputs" style="display:none; margin-top:8px; display:grid; grid-template-columns:1fr 1fr; gap:8px;">
              <input type="date" id="startDateFilter" class="filter-input" onchange="applyCustomDateFilter()">
              <input type="date" id="endDateFilter" class="filter-input" onchange="applyCustomDateFilter()">
            </div>
          </div>
          <!-- Additional filter content can be added here -->
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Additional content like modals and scripts can be added here -->
