// ตรวจจับ in-app browser (LINE/FB/IG) แบบกว้าง ๆ
function isInAppBrowser() {
  const ua = navigator.userAgent || '';
  const isLine = /Line\//i.test(ua);
  const isFB = /FBAN|FBAV|FB_IAB/i.test(ua);
  const isIG = /Instagram/i.test(ua);
  const isTwitter = /Twitter/i.test(ua);
  
  // เพิ่มการตรวจสอบ iOS WebView
  const isIOSWebView = /(iPhone|iPod|iPad).*AppleWebKit(?!.*Safari)/i.test(ua);
  
  // เพิ่มการตรวจสอบ Android WebView
  const isAndroidWebView = /wv|Version\/[\d\.]+.*Chrome\/[\d\.]+ Mobile/i.test(ua);
  
  return isLine || isFB || isIG || isTwitter || isIOSWebView || isAndroidWebView;
}


/**
 * เปิด URL อย่างปลอดภัย - ใช้ <a> element
 */
function openUrlSafely(url) {
  if (!url) return;
  
  // ตรวจสอบ URL
  if (!/^https?:\/\//i.test(url)) {
    Swal.fire({
      icon: 'error',
      title: 'URL ไม่ถูกต้อง',
      text: 'กรุณาตรวจสอบลิงก์'
    });
    return;
  }
  
  // ⭐ ใช้ <a> element ตั้งแต่แรก (ไม่โดน popup blocker)
  const link = document.createElement('a');
  link.href = url;
  link.target = '_blank';
  link.rel = 'noopener noreferrer';
  
  // เพิ่มลง DOM ชั่วคราว
  document.body.appendChild(link);
  
  // คลิก
  link.click();
  
  // ลบออก
  document.body.removeChild(link);
  
  console.log('✅ เปิดไฟล์: ' + url);
}



/* ① ปิด ripple (และโค้ดที่เรียกชื่อ createRipple) เมื่ออยู่ใน userCodeAppPanel / OAuth dialog */
(function hardDisableRippleInDialogs(){
  try {
    var isDialog = (window.self !== window.top) ||
                   (location.search && /userCodeAppPanel|createOAuthDialog/i.test(location.search)) ||
                   (document.referrer && /userCodeAppPanel|createOAuthDialog/i.test(document.referrer));
    if (isDialog) {
      // ถ้าที่อื่นในระบบเรียกชื่อฟังก์ชัน createRipple ให้กลายเป็น no-op
      window.createRipple = function(){};
      // ไม่ทำอะไรต่อใน dialog นี้
      return;
    }
  } catch(e) {
    // ถ้าโดน security error จาก cross-frame ก็ถือเป็น dialog แล้วปิดไว้
    window.createRipple = function(){};
    return;
  }

  /* ② (เฉพาะหน้าแอปหลัก) Ripple ที่ปลอดภัยด้วย event delegation */
  if (window.__rktSafeRippleBound) return;
  window.__rktSafeRippleBound = true;

  document.addEventListener('click', function(e){
    // จำกัดเฉพาะปุ่มที่เราใช้จริงในหน้า (เพิ่ม/ลด selector ได้)
    var btn = e.target && e.target.closest('.btn, .btn-gform, .m-icon-btn, .m-nav-btn');
    if (!btn || btn.hasAttribute('data-no-ripple')) return;
    rktCreateRipple(e, btn);
  });

  function rktCreateRipple(e, el){
    if (!el || el.nodeType !== 1 || typeof el.getBoundingClientRect !== 'function') return;

    var style = getComputedStyle(el);
    if (style.position === 'static') el.style.position = 'relative';
    el.style.overflow = 'hidden';

    var old = el.querySelector('.ripple'); if (old) old.remove();

    var rect = el.getBoundingClientRect();
    var size = Math.max(rect.width, rect.height);
    var x = ((e && 'clientX' in e) ? e.clientX : rect.left + rect.width/2) - rect.left - size/2;
    var y = ((e && 'clientY' in e) ? e.clientY : rect.top  + rect.height/2) - rect.top  - size/2;

    var ripple = document.createElement('span');
    ripple.className = 'ripple';
    Object.assign(ripple.style, {
      position:'absolute', left:x+'px', top:y+'px',
      width:size+'px', height:size+'px', borderRadius:'50%',
      background:'rgba(255,255,255,.35)', transform:'scale(0)',
      pointerEvents:'none', animation:'ripple-expand .6s ease-out forwards'
    });
    el.appendChild(ripple);
    ripple.addEventListener('animationend', function(){ ripple.remove(); });
  }

  // inject keyframes หนึ่งครั้ง
  var ID = 'rkt-ripple-keyframes';
  if (!document.getElementById(ID)) {
    var s = document.createElement('style');
    s.id = ID;
    s.textContent = '@keyframes ripple-expand{to{transform:scale(4);opacity:0}} .ripple{will-change:transform,opacity}';
    document.head.appendChild(s);
  }
})();
/* passive listeners ตัวอย่าง */
window.addEventListener('scroll', ()=>{}, {passive:true});
window.addEventListener('touchstart', ()=>{}, {passive:true});

/* debounce ค้นหา */
const onSearch = debounce(() => { /* TODO: filter + re-render (batch) */ }, 200);

/* render เป็นชุด ๆ (ใช้เมื่อต้องเติม DOM จำนวนมาก) */
function renderInBatches(items, renderOne, batchSize=30){
  let i=0; const step=()=>{ const end=Math.min(i+batchSize,items.length);
    for(;i<end;i++) renderOne(items[i]);
    if(i<items.length) requestAnimationFrame(step);
  }; requestAnimationFrame(step);
}
</script>

<script>
/**
 * โหลดโลโก้โรงเรียนจาก Google Drive
 */
function loadSchoolLogo() {
  const logoImg = document.querySelector('.header-icon img');
  const logoPlaceholder = document.getElementById('logoPlaceholder');
  
  if (!logoImg) {
    console.error('❌ ไม่พบ element img ของโลโก้');
    return;
  }
  
  // ตรวจสอบว่าอยู่ใน Google Apps Script หรือไม่
  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    console.log('⚠️ ไม่ได้อยู่ใน Google Apps Script - แสดง Emoji แทน');
    showFallbackLogo();
    return;
  }
  
  console.log('🔄 กำลังโหลดโลโก้...');
  
  // Timeout fallback - ถ้า 5 วินาทียังไม่เสร็จให้แสดง emoji
  const timeout = setTimeout(function() {
    console.log('⏱️ Timeout - แสดง Emoji แทน');
    showFallbackLogo();
  }, 5000);
  
  google.script.run
    .withSuccessHandler(function(result) {
      clearTimeout(timeout);
      console.log('📡 ได้รับผลลัพธ์:', result);
      
      if (result && result.success) {
        // โหลดสำเร็จ - แสดงรูป
        logoImg.src = `data:${result.mimeType};base64,${result.data}`;
        
        // ⭐ ลบ inline style ทั้งหมด
        logoImg.removeAttribute('style');
        logoImg.style.display = 'block';
        
        logoImg.onload = function() {
          console.log('✅ แสดงโลโก้สำเร็จ:', result.fileName);
        };
        
        if (logoPlaceholder) {
          logoPlaceholder.style.display = 'none';
        }
        
      } else {
        // โหลดไม่สำเร็จ - แสดง Emoji
        console.error('❌ ไม่สามารถโหลดโลโก้:', result ? result.error : 'Unknown error');
        showFallbackLogo();
      }
    })
    .withFailureHandler(function(error) {
      clearTimeout(timeout);
      console.error('❌ Error:', error.message || error);
      showFallbackLogo();
    })
    .serveSchoolLogo();
}

/**
 * แสดง Emoji แทนเมื่อโหลดโลโก้ไม่สำเร็จ
 */
function showFallbackLogo() {
  const logoImg = document.querySelector('.header-icon img');
  const logoPlaceholder = document.getElementById('logoPlaceholder');
  
  if (logoImg) {
    logoImg.style.display = 'none';
  }
  
  if (logoPlaceholder) {
    logoPlaceholder.innerHTML = '🏫';
    logoPlaceholder.style.fontSize = '64px';
    logoPlaceholder.style.marginBottom = '16px';
    logoPlaceholder.style.display = 'block';
  }
  
  console.log('⚠️ แสดง Emoji แทนโลโก้');
}

// ⭐ เรียกใช้เมื่อหน้าเว็บโหลดเสร็จ
document.addEventListener('DOMContentLoaded', function() {
  console.log('🚀 เริ่มโหลดโลโก้โรงเรียน...');
  setTimeout(loadSchoolLogo, 500);
});

</script>

<script>
// ===== Settings Functions =====

// เปิด/ปิด Settings Modal
function openSettingsModal() {
  const modal = document.getElementById('settingsModal');
  if (modal) {
    modal.classList.add('active');
    // ไม่ lock body scroll เพื่อป้องกันปัญหา
    loadSettings();
  }
}

function closeSettingsModal() {
  const modal = document.getElementById('settingsModal');
  if (modal) {
    modal.classList.remove('active');
  }
  
  // Force reset body styles - แก้ปัญหาเลื่อนไม่ได้
  document.body.style.cssText = '';
  document.body.classList.remove('modal-open');
  document.documentElement.style.overflow = '';
  document.documentElement.style.position = '';
  
  // Force enable scroll
  setTimeout(function() {
    document.body.style.overflow = 'auto';
    document.body.style.position = 'static';
    window.scrollTo(window.scrollX, window.scrollY);
  }, 100);
}

// โหลดการตั้งค่าจาก localStorage
function loadSettings() {
  const settings = JSON.parse(localStorage.getItem('rktSettings') || '{}');
  
  // มุมมอง
  const view = settings.view || 'list';
  document.querySelectorAll('#optGrid, #optList').forEach(btn => btn.classList.remove('active'));
  document.getElementById(view === 'grid' ? 'optGrid' : 'optList')?.classList.add('active');
  
  // จำนวนต่อหน้า
  const perPage = settings.perPage || 20;
  document.querySelectorAll('[data-per-page]').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.perPage) === perPage);
  });
  
  // เรียงลำดับ
  const sort = settings.sortOrder || 'newest';
  document.querySelectorAll('[data-sort]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.sort === sort);
  });
  
  // ขนาดตัวอักษร
  const font = settings.fontSize || 'medium';
  document.querySelectorAll('[data-font]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.font === font);
  });
}

// บันทึกการตั้งค่า
function saveSettings(key, value) {
  const settings = JSON.parse(localStorage.getItem('rktSettings') || '{}');
  settings[key] = value;
  localStorage.setItem('rktSettings', JSON.stringify(settings));
}

// ตั้งค่ามุมมอง
function setView(view) {
  closeSettingsModal();
  
  if (typeof switchView === 'function') {
    switchView(view);
  }
  
  showToast('เปลี่ยนมุมมองเป็น ' + (view === 'grid' ? 'การ์ด' : 'รายการ'), 'success');
}

// ตั้งค่าจำนวนต่อหน้า
function setPerPage(num) {
  document.querySelectorAll('[data-per-page]').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.perPage) === num);
  });
  
  saveSettings('perPage', num);
  
  // อัปเดตตัวแปร global (ถ้ามี)
  if (typeof itemsPerPage !== 'undefined') {
    window.itemsPerPage = num;
  }
  
  // ปิด modal
  closeSettingsModal();
  
  // รีโหลดข้อมูล
  if (typeof renderDocuments === 'function') {
    renderDocuments();
  }
  
  showToast('แสดง ' + num + ' รายการต่อหน้า', 'success');
}

// ตั้งค่าเรียงลำดับ
function setSortOrder(order) {
  document.querySelectorAll('[data-sort]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.sort === order);
  });
  
  saveSettings('sortOrder', order);
  
  // ปิด modal
  closeSettingsModal();
  
  // เรียงข้อมูลใหม่
  if (typeof sortDocuments === 'function') {
    sortDocuments(order);
  } else if (typeof allDocuments !== 'undefined' && Array.isArray(allDocuments)) {
    // เรียงข้อมูลเอง
    switch(order) {
      case 'newest':
        allDocuments.sort((a, b) => new Date(b.timestamp || b.date || 0) - new Date(a.timestamp || a.date || 0));
        break;
      case 'oldest':
        allDocuments.sort((a, b) => new Date(a.timestamp || a.date || 0) - new Date(b.timestamp || b.date || 0));
        break;
      case 'name-asc':
        allDocuments.sort((a, b) => (a.title || a.name || '').localeCompare(b.title || b.name || '', 'th'));
        break;
      case 'name-desc':
        allDocuments.sort((a, b) => (b.title || b.name || '').localeCompare(a.title || a.name || '', 'th'));
        break;
    }
    
    if (typeof renderDocuments === 'function') {
      renderDocuments();
    }
  }
  
  const orderNames = {
    'newest': 'ใหม่สุดก่อน',
    'oldest': 'เก่าสุดก่อน',
    'name-asc': 'ชื่อ ก-ฮ',
    'name-desc': 'ชื่อ ฮ-ก'
  };
  showToast('เรียงลำดับ: ' + orderNames[order], 'success');
}

// ตั้งค่าขนาดตัวอักษร
function setFontSize(size) {
  document.querySelectorAll('[data-font]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.font === size);
  });
  
  saveSettings('fontSize', size);
  
  // ลบ class เดิม
  document.body.classList.remove('font-small', 'font-medium', 'font-large');
  
  // เพิ่ม class ใหม่
  if (size !== 'medium') {
    document.body.classList.add('font-' + size);
  }
  
  // ปิด modal หลังเปลี่ยนขนาด
  closeSettingsModal();
  
  const sizeNames = { 'small': 'เล็ก', 'medium': 'กลาง', 'large': 'ใหญ่' };
  showToast('ขนาดตัวอักษร: ' + sizeNames[size], 'success');
}

// รีเฟรชข้อมูล
function refreshData() {
  closeSettingsModal();
  
  if (typeof loadDocuments === 'function') {
    showLoading('กำลังโหลดข้อมูลใหม่...');
    loadDocuments();
    showToast('รีเฟรชข้อมูลสำเร็จ', 'success');
  } else {
    // Fallback: reload หน้า
    location.reload();
  }
}

// ล้างแคชและตั้งค่าทั้งหมด
function clearAllSettings() {
  Swal.fire({
    title: 'ล้างแคช?',
    text: 'การตั้งค่าทั้งหมดจะถูกรีเซ็ต',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#ef4444',
    cancelButtonColor: '#64748b',
    confirmButtonText: 'ล้างเลย',
    cancelButtonText: 'ยกเลิก'
  }).then((result) => {
    if (result.isConfirmed) {
      localStorage.removeItem('rktSettings');
      localStorage.removeItem('rktCache');
      
      // รีเซ็ต font size
      document.body.classList.remove('font-small', 'font-large');
      
      closeSettingsModal();
      showToast('ล้างแคชสำเร็จ', 'success');
      
      // รีโหลดหน้า
      setTimeout(() => location.reload(), 500);
    }
  });
}

// แสดง Toast
function showToast(message, type = 'success') {
  const Toast = Swal.mixin({
    toast: true,
    position: 'top-end',
    showConfirmButton: false,
    timer: 2000,
    timerProgressBar: true,
    didOpen: (toast) => {
      toast.addEventListener('mouseenter', Swal.stopTimer);
      toast.addEventListener('mouseleave', Swal.resumeTimer);
    }
  });
  
  Toast.fire({
    icon: type,
    title: message
  });
}

// ปิด modal เมื่อคลิกพื้นหลัง
document.addEventListener('click', function(e) {
  const modal = document.getElementById('settingsModal');
  if (e.target === modal) {
    closeSettingsModal();
  }
});

// โหลดการตั้งค่าเมื่อเริ่มต้น
document.addEventListener('DOMContentLoaded', function() {
  const settings = JSON.parse(localStorage.getItem('rktSettings') || '{}');
  
  // ใช้ขนาดตัวอักษรที่บันทึกไว้
  if (settings.fontSize && settings.fontSize !== 'medium') {
    document.body.classList.add('font-' + settings.fontSize);
  }
  
  // ใช้มุมมองที่บันทึกไว้
  if (settings.view && typeof switchView === 'function') {
    switchView(settings.view);
  }
});

// ===== Mobile: Toggle Filter Controls =====
document.addEventListener('DOMContentLoaded', function() {
  const filterBtn = document.querySelector('.btn-filter');
  const controls = document.querySelector('.controls');
  
  if (filterBtn && controls) {
    filterBtn.addEventListener('click', function(e) {
      // ป้องกันการทำงานซ้ำกับ toggleAdvancedFilters
      if (window.innerWidth > 768) return;
      
      e.preventDefault();
      e.stopPropagation();
      
      controls.classList.toggle('show-filters');
      
      // เปลี่ยนข้อความปุ่ม
      if (controls.classList.contains('show-filters')) {
        this.innerHTML = '<i class="fas fa-times"></i> ซ่อนตัวกรอง';
        this.classList.add('active');
      } else {
        this.innerHTML = '<i class="fas fa-filter"></i> ตัวกรองเพิ่มเติม';
        this.classList.remove('active');
      }
    });
  }
});
