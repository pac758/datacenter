// ⭐⭐⭐ ย้าย debounce มาไว้ตรงนี้ (ก่อนที่จะถูกเรียกใช้) ⭐⭐⭐
function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

// ปลอดภัย/เร็ว พอเพียงกับงานเอกสาร
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = String(text);
  return div.innerHTML;
}
// ⭐ เพิ่มฟังก์ชันนี้
/**
 * ตรวจสอบความถูกต้องของ URL
 */
function validateUrl(url) {
  try {
    const urlObj = new URL(url);
    // ตรวจสอบว่าเป็น http หรือ https
    return urlObj.protocol === 'http:' || urlObj.protocol === 'https:';
  } catch (e) {
    return false;
  }
}

/**
 * ตรวจสอบว่า URL เป็น Google Drive/Docs หรือไม่
 */
function isGoogleUrl(url) {
  return url.includes('drive.google.com') || 
         url.includes('docs.google.com');
}

/**
 * ตรวจสอบว่า URL สามารถดาวน์โหลดโดยตรงได้หรือไม่
 */
function isDirectDownloadUrl(url) {
  // URL ที่รู้จักว่าดาวน์โหลดได้โดยตรง
  const directDomains = [
    'github.com',
    'raw.githubusercontent.com',
    'dl.dropboxusercontent.com',
    'onedrive.live.com',
    's3.amazonaws.com',
    'storage.googleapis.com'
  ];
  
  return directDomains.some(domain => url.includes(domain));
}

function initDragAndDrop() {
  const area = document.getElementById('fileUploadArea');
  const fileInput = document.getElementById('add_file');
  const fileInputMore = document.getElementById('add_file_more');
  
  if (!area) return;
  
  // ⭐ ลบ event listener เก่าก่อน (ป้องกันซ้ำ)
  if (area.__dragDropBound) return;
  area.__dragDropBound = true;
  
  ['dragenter', 'dragover'].forEach(evt => {
    area.addEventListener(evt, handleDragOver, false);
  });
  
  ['dragleave', 'drop'].forEach(evt => {
    area.addEventListener('dragleave', handleDragLeave, false);
  });
  
  area.addEventListener('drop', handleDrop, false);
  
  if (fileInput && !fileInput.__changeBound) {
    fileInput.addEventListener('change', e => addFilesToList(e.target.files));
    fileInput.__changeBound = true;
  }
  
  if (fileInputMore && !fileInputMore.__changeBound) {
    fileInputMore.addEventListener('change', e => addFilesToList(e.target.files));
    fileInputMore.__changeBound = true;
  }
}

// ฟังก์ชันช่วย
function handleDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  this.classList.add('drag-over');
}

function handleDragLeave(e) {
  e.preventDefault();
  e.stopPropagation();
  this.classList.remove('drag-over');
}

function handleDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  this.classList.remove('drag-over');
  if (e.dataTransfer?.files?.length) {
    addFilesToList(e.dataTransfer.files);
  }
}

function previewUrls() {
  const input   = document.getElementById('urlInput');
  const listBox = document.getElementById('urlFileDisplay');
  const list    = document.getElementById('urlListContainer');

  const urls = input.value.split('\n');

  input.value = urls.join('\n');

  data: null,           // เก็บข้อมูล
  timestamp: null,      // เก็บเวลาที่โหลด
  filters: null,        // เก็บ filters ที่ใช้
  page: null           // เก็บหน้าที่โหลด

const CACHE_DURATION = 60000; // 1 นาที (60,000 มิลลิวินาที)


// === NEW: multi-page cache ===
const pageCache = new Map(); // key -> { data, totalPages, timestamp }

function cacheKey(page, filters) {
  return JSON.stringify({ page, filters: filters || {} });
}

function isCacheValidFor(page, filters) {
  const k = cacheKey(page, normalizeFilters(filters));
  const entry = pageCache.get(k);
  
  if (!entry) {
    console.log('❌ ไม่มี Cache สำหรับ:', k);
    return false;
  }
  
  const age = Date.now() - entry.timestamp;
  const isValid = age <= CACHE_DURATION;
  
  console.log('🔍 Cache Check:', {
    key: k,
    age: Math.round(age / 1000) + 's',
    isValid,
    dataCount: entry.data?.length
  });
  
  return isValid;
}

function saveToCache(data, page, filters, totalPages, total) {
  const k = cacheKey(page, filters);
  pageCache.set(k, { 
    data, 
    totalPages, 
    total: total || data.length,  // ⭐ เก็บ total
    timestamp: Date.now() 
  });
  console.log('💾 Save to Cache:', { 
    key: k, 
    items: data.length, 
    total: total,          // ⭐ แสดงใน log
    totalPages 
  });
}

function getFromCache(page, filters) {
  const c = pageCache.get(cacheKey(page, filters));
  
  if (c) {
    console.log('📦 Get from Cache:', { 
      items: c.data?.length || 0, 
      total: c.total || 0,        // ⭐ แสดงใน log
      totalPages: c.totalPages 
    });
  } else {
    console.log('❌ No cache found');
  }
  
  return c;
}

function clearCache() {
  pageCache.clear();
  console.log('🗑️ ล้าง Cache ทั้งหมด');
  
  // ⭐ เพิ่ม: ล้าง search cache ด้วย

}

function applyQuickDatePreset() {
  const preset = document.getElementById('quickDatePreset');
  if (!preset) return;
  
  const value = preset.value;
  if (!value) return;
  
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  let start, end;
  
  switch(value) {
    case 'today':
      start = new Date(today);
      end = new Date(today);
      break;
      
    case 'week':
      const dayOfWeek = today.getDay();
      const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
      
      start = new Date(today);
      start.setDate(today.getDate() + mondayOffset);
      
      end = new Date(start);
      end.setDate(start.getDate() + 6);
      break;
      
    case 'month':
      start = new Date(today.getFullYear(), today.getMonth(), 1);
      end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
      break;
      
    case 'year':
      start = new Date(today.getFullYear(), 0, 1);
      end = new Date(today.getFullYear(), 11, 31);
      break;
      
    default:
      return;
  }
  
  currentFilters.startDate = formatDateForInput(start);
  currentFilters.endDate = formatDateForInput(end);
  currentFilters.datePreset = value;
  
  currentPage = 1;
  clearCache();
  loadDocuments(true);
  
  console.log('📅 Quick Preset:', value);
}

function formatDateForInput(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return year + '-' + month + '-' + day;
}

/**

 */
function loadTagOptions() {
  const select = document.getElementById('tagFilter');
  if (!select || select.options.length > 1) return;
  
  const allTags = new Set();
  allDocuments.forEach(doc => {
    if (doc.tags) {
      doc.tags.split(',').forEach(tag => {
        const t = tag.trim();
        if (t) allTags.add(t);
      });
    }
  });
  
  [...allTags].sort().forEach(tag => {
    const option = document.createElement('option');
    option.value = tag;
    option.textContent = tag;
    select.appendChild(option);
  });
  
  console.log('✅ โหลดแท็ก:', allTags.size, 'แท็ก');
}

  console.log('🔍 กำลังใช้ตัวกรองขั้นสูง...');
  
  // อ่านค่าจาก UI
  advancedFilters.submitter = document.getElementById('submitterFilter')?.value || null;
  advancedFilters.tag = document.getElementById('tagFilter')?.value || null;
  advancedFilters.fileType = document.getElementById('fileTypeFilter')?.value || null;
  advancedFilters.status = document.getElementById('statusFilter')?.value || null;
  
  // กรองข้อมูล (เริ่มจาก allDocuments)
  let filtered = [...allDocuments];
  
  // 1. หมวดหมู่ (จาก filter เดิม)
  if (currentFilters.category) {
    filtered = filtered.filter(doc => doc.category === currentFilters.category);
  }
  
  // 2. ประเภทเอกสาร (จาก filter เดิม)
  if (currentFilters.type) {
    filtered = filtered.filter(doc => doc.document_type === currentFilters.type);
  }
  
  // 3. ผู้ส่ง
  if (advancedFilters.submitter) {
    filtered = filtered.filter(doc => doc.submitter_name === advancedFilters.submitter);
  }
  
  // 4. แท็ก
  if (advancedFilters.tag) {
    filtered = filtered.filter(doc => {
      if (!doc.tags) return false;
      const tags = doc.tags.split(',').map(t => t.trim().toLowerCase());
      return tags.includes(advancedFilters.tag.toLowerCase());
    });
  }
  
  // 5. ชนิดไฟล์
  if (advancedFilters.fileType) {
    filtered = filtered.filter(doc => {
      if (!doc.file_objects_json) return false;
      try {
        const files = JSON.parse(doc.file_objects_json);
        if (!Array.isArray(files)) return false;
        
        return files.some(f => {
          const ext = (f.name || '').split('.').pop().toLowerCase();
          return matchFileType(ext, advancedFilters.fileType);
        });
      } catch (e) {
        return false;
      }
    });
  }
  
  // 6. สถานะ
  if (advancedFilters.status) {
    filtered = filtered.filter(doc => {
      switch (advancedFilters.status) {
        case 'has-file':
          return doc.file_objects_json && doc.file_objects_json !== '[]' && doc.file_objects_json !== '';
        case 'no-file':
          return !doc.file_objects_json || doc.file_objects_json === '[]' || doc.file_objects_json === '';
        case 'has-note':
          return doc.description && doc.description.trim().length > 0;
        case 'no-note':
          return !doc.description || doc.description.trim().length === 0;
        default:
          return true;
      }
    });
  }
  
  // 7. วันที่ (จาก currentFilters)
  if (currentFilters.startDate || currentFilters.endDate) {
    filtered = filtered.filter(doc => {
      if (!doc.created_at) return false;
      const docDate = new Date(doc.created_at);
      
      if (currentFilters.startDate) {
        const start = new Date(currentFilters.startDate);
        start.setHours(0, 0, 0, 0);
        if (docDate < start) return false;
      }
      
      if (currentFilters.endDate) {
        const end = new Date(currentFilters.endDate);
        end.setHours(23, 59, 59, 999);
        if (docDate > end) return false;
      }
      
      return true;
    });
  }
  
  // 8. ค้นหา (จาก currentFilters)
  if (currentFilters.searchTerm) {
    const term = currentFilters.searchTerm.toLowerCase();
    filtered = filtered.filter(doc => {
      return (
        (doc.title || '').toLowerCase().includes(term) ||
        (doc.submitter_name || '').toLowerCase().includes(term) ||
        (doc.description || '').toLowerCase().includes(term) ||
        (doc.tags || '').toLowerCase().includes(term)
      );
    });
  }
  
  // เรียงลำดับ
  filtered.sort((a, b) => {
    const dateA = new Date(a.created_at || 0);
    const dateB = new Date(b.created_at || 0);
    return currentSortOrder === 'desc' ? dateB - dateA : dateA - dateB;
  });
  
  // แสดงผล
  filteredDocuments = filtered;
  renderDocuments(filtered);
  
  // อัปเดตจำนวนผลลัพธ์
  const resultCount = document.getElementById('resultCount');
  if (resultCount) {
    resultCount.textContent = filtered.length;
  }
  
  // แสดง Active Filters
  displayActiveFilters();
  
  // อัปเดต Badge จำนวนตัวกรอง
  updateFilterCount();
  
  console.log('✅ พบ', filtered.length, 'รายการ');
}

/**
 * จับคู่ชนิดไฟล์
 */
function matchFileType(extension, filterType) {
  const typeMap = {
    'pdf': ['pdf'],
    'doc': ['doc', 'docx'],
    'xls': ['xls', 'xlsx', 'csv'],
    'ppt': ['ppt', 'pptx'],
    'image': ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'],
    'video': ['mp4', 'webm', 'ogg', 'mov', 'avi', 'mkv', 'wmv', 'm4v']
  };
  
  const extensions = typeMap[filterType] || [];
  return extensions.includes(extension);
}

      'has-note': 'มีหมายเหตุ',

    });

    const end = currentFilters.endDate ? new Date(currentFilters.endDate).toLocaleDateString('th-TH', {year: 'numeric', month: 'short', day: 'numeric'}) : '';

  container.style.display = 'flex';
}

      break;
    case 'tag':

      advancedFilters.tag = null;
      break;
    case 'fileType':

      advancedFilters.fileType = null;
      break;
    case 'status':
      document.getElementById('statusFilter').value = '';

/**
 * อัปเดตจำนวนตัวกรองที่ใช้งาน
 */
function updateFilterCount() {
  const badge = document.getElementById('filterCount');
  if (!badge) return;
  
  let count = 0;
  
  if (currentFilters.category) count++;
  if (currentFilters.type) count++;
  if (advancedFilters.submitter) count++;
  if (advancedFilters.tag) count++;
  if (advancedFilters.fileType) count++;
  if (advancedFilters.status) count++;
  if (currentFilters.startDate || currentFilters.endDate) count++;
  
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline-flex';
  } else {
    badge.style.display = 'none';
  }
}

 // ⭐ เพิ่มฟังก์ชันนี้
function highlightText(text, searchTerm) {
  if (!searchTerm || !text) return escapeHtml(text);
  
  const regex = new RegExp(`(${escapeRegex(searchTerm)})`, 'gi');
  return escapeHtml(text).replace(regex, '<mark style="background:#ffeb3b;padding:2px 4px;border-radius:3px;">$1</mark>');
}

function escapeRegex(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/** เรียก GAS แบบ safe: ไม่ให้ผุด OAuth dialog ตอนโหลดหน้า */
function runSafe(fnName, args = [], onOk = () => {}, onFail = () => {}) {
  if (!window.google || !google.script || !google.script.run) {
    console.warn('not Apps Script webapp context');
    onFail(new Error('Not GAS context'));
    return;
  }
  // จับ error แล้ว "ไม่เปิด dialog" ซ้ำ
  google.script.run
    .withSuccessHandler(onOk)
    .withFailureHandler(function (err) {
      const msg = (err && err.message) || '';
      // ลักษณะข้อความที่บอกว่าต้องขอสิทธิ์/authorize
      const needsAuth =
        /authorize|Authorization|needs your permission|Please authorize/i.test(msg);
      if (needsAuth) {
        console.warn('Blocked an auth-required call on load:', fnName, msg);
        // TODO: โชว์ปุ่มให้ผู้ใช้กดเพื่อเริ่มคอลล์นี้แทน (ดูข้อ 2)
        onFail(new Error('AUTH_REQUIRED'));
        return;
      }
      onFail(err);
    })[fnName].apply(null, args);
}
    
    // Load Statistics
    function loadStatistics() {
      // ตรวจสอบว่าอยู่ใน Google Apps Script หรือไม่

        console.log('⚠️ loadStatistics: ไม่ได้อยู่ใน Google Apps Script');
        return;
      }
      
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            const stats = result.data;
            document.getElementById('totalDocs').textContent = stats.totalDocs || 0;
            document.getElementById('todayDocs').textContent = stats.todayDocs || 0;
            document.getElementById('categoriesCount').textContent = stats.categoriesCount || 0;
            document.getElementById('submittersCount').textContent = stats.submittersCount || 0;
          }
        })
        .getStatistics();
    }
    
   // ===== แทนที่ฟังก์ชัน loadDocuments เดิมทั้งหมด =====
function loadDocuments(forceRefresh = false, { suppressOverlay = false } = {}) {
  // ✅ ตรวจสอบว่าอยู่ใน Google Apps Script หรือไม่
  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    console.log('⚠️ ไม่ได้อยู่ใน Google Apps Script');
    const container = document.getElementById('documentsView');
    if (container) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-triangle" style="color: #f59e0b;"></i>
          <h3>ไม่สามารถโหลดข้อมูลได้</h3>
          <p>กรุณาเปิดใช้งานผ่าน Google Apps Script</p>
        </div>`;
    }
    return;
  }

  // ✅ ถ้าต้องการรีเฟรช/เปลี่ยนตัวกรอง/สลับลำดับ ให้เริ่มที่หน้า 1 เสมอ
  if (forceRefresh) {
    currentPage = 1;
  }

  // ✅ รับลำดับการเรียง: ค่าเริ่มต้นเป็น 'desc' = ล่าสุดก่อน
  const resolvedSortOrder =
    (typeof currentSortOrder === 'string' && currentSortOrder.toLowerCase() === 'asc')
      ? 'asc'
      : 'desc';

  const cleanFilters = {
    category: currentFilters.category || null,
    type: currentFilters.type || null,
    searchTerm: currentFilters.searchTerm || null,
    // ✅ ส่ง sortOrder ไปให้เซิร์ฟเวอร์เพื่อจัดเรียงที่ต้นทาง
    sortOrder: resolvedSortOrder
  };

  // ป้องกัน currentPage ผิดปกติ
  currentPage = Math.max(1, Number(currentPage) || 1);

  console.log('📥 loadDocuments:', {
    forceRefresh,
    currentPage,
    pageSize,
    filters: cleanFilters
  });

  if (!suppressOverlay) showLoading('กำลังโหลดเอกสาร...');

  google.script.run
    .withSuccessHandler(function (result) {
      hideLoading();

      console.log('📡 Server Response:', result);

      // ⭐ เพิ่มการตรวจสอบ result
      if (!result) {
        showError('ไม่ได้รับข้อมูลจาก Server');
        return;
      }

      if (!result.success) {
        // ⭐ แสดง error พร้อมรายละเอียด
        let errorMsg = 'โหลดข้อมูลไม่สำเร็จ: ' + (result.error || 'Unknown error');

        if (result.details) {
          errorMsg += '\n\n' +
            'Spreadsheet ID: ' + result.details.spreadsheetId + '\n' +
            'Sheet Name: ' + result.details.sheetName;
        }

        Swal.fire({
          icon: 'error',
          title: 'เกิดข้อผิดพลาด',
          text: errorMsg,
          footer: '<a href="https://docs.google.com/spreadsheets/d/' +
            SPREADSHEET_ID + '/edit" target="_blank">เปิด Spreadsheet</a>'
        });

        filteredDocuments = [];
        renderDocuments([]);
        return;
      }

      const data = result.data || [];
      allDocuments = data;
      filteredDocuments = [...data];
      totalPages = result.totalPages || 1;

      // ✅ ให้ยึดค่าหน้าจากเซิร์ฟเวอร์ ถ้าไม่มี ให้กลับเป็นหน้า 1
      currentPage = result.page || 1;

      // ⭐ ถ้าไม่มีข้อมูล แสดง message
      if (data.length === 0 && result.message) {
        Swal.fire({
          icon: 'info',
          title: 'ยังไม่มีข้อมูล',
          text: result.message
        });
      }

      // เก็บแคชตามลำดับใหม่และหน้าปัจจุบัน
      saveToCache(data, currentPage, cleanFilters, totalPages, result.total);

      // เรนเดอร์รายการและเพจจิ้ง
      renderDocuments(allDocuments);
      updatePagination({
        page: result.page || 1,
        pageSize: result.pageSize || pageSize,
        total: result.total || 0,
        totalPages: result.totalPages || 1,
        hasPrev: result.hasPrev || false,
        hasNext: result.hasNext || false
      });

      // โหลดตัวกรอง (เช่น นับจำนวน หมวดหมู่/ประเภท ฯลฯ)
      loadFilters();

      console.log('✅ โหลดเสร็จ:', allDocuments.length, 'รายการ (sort:', resolvedSortOrder, ')');
    })
    .withFailureHandler(function (error) {
      hideLoading();

      console.error('❌ Error:', error);

      // ⭐ แสดง error แบบละเอียด
      Swal.fire({
        icon: 'error',
        title: 'ไม่สามารถเชื่อมต่อได้',
        html: `
          <p>กรุณาตรวจสอบ:</p>
          <ul style="text-align: left;">
            <li>Spreadsheet ID และ Sheet Name ถูกต้อง</li>
            <li>Script ได้รับอนุญาตสิทธิ์แล้ว</li>
            <li>Deploy แล้วเป็น Web app</li>
          </ul>
          <p><small>${error}</small></p>
        `,
        showCancelButton: true,
        confirmButtonText: 'ดูวิธีแก้ไข',
        cancelButtonText: 'ปิด'
      }).then((result) => {
        if (result.isConfirmed) {
          window.open('https://developers.google.com/apps-script/guides/web', '_blank');
        }
      });

      filteredDocuments = [];

  // 1) ถ้ามี file_url (จากชีต) ใช้อันนั้นก่อน
  if (item.file_url) return item.file_url;

  // 2) ถ้ามี file_objects (จาก JSON) ให้ใช้ตัวแรก

    return f.fileUrl || f.previewUrl || f.url || null;

  // 3) ไม่มีเลย

}

/**
 * 📊 สร้างเลขหน้า pagination แบบมี ellipsis (...)
 */
function generatePageNumbers(currentPage, totalPages, maxVisible = 7) {
  const pages = [];
  
  if (totalPages <= maxVisible) {
    // ถ้าหน้าน้อย แสดงทั้งหมด
    for (let i = 1; i <= totalPages; i++) {
      pages.push(i);
    }
  } else {
    // แสดงหน้าแรก
    pages.push(1);
    
    const leftSiblings = Math.floor((maxVisible - 3) / 2);
    const rightSiblings = Math.ceil((maxVisible - 3) / 2);
    
    let startPage = Math.max(2, currentPage - leftSiblings);
    let endPage = Math.min(totalPages - 1, currentPage + rightSiblings);
    
    // ปรับให้ครบจำนวนที่ต้องการแสดง
    if (currentPage - leftSiblings <= 2) {
      endPage = Math.min(totalPages - 1, maxVisible - 2);
    }
    if (currentPage + rightSiblings >= totalPages - 1) {
      startPage = Math.max(2, totalPages - maxVisible + 2);
    }
    
    // เพิ่ม ... ด้านซ้าย
    if (startPage > 2) {
      pages.push('...');
    }
    
    // เพิ่มหน้าตรงกลาง
    for (let i = startPage; i <= endPage; i++) {
      pages.push(i);
    }
    
    // เพิ่ม ... ด้านขวา
    if (endPage < totalPages - 1) {
      pages.push('...');
    }
    
    // แสดงหน้าสุดท้าย
    pages.push(totalPages);
  }
  
  return pages;
}

/**
 * 📊 ไปยังหน้าที่ระบุ
 */
function gotoPage(page) {
  if (page >= 1 && page <= totalPages && page !== currentPage) {
    currentPage = page;
    pushListState(currentPage);
    loadDocuments(false, { suppressOverlay: true });
  }
}

/**
 * 📊 แสดงปุ่ม pagination ภายใต้ตาราง (พร้อมเลขหน้า)
 */
function renderPagination(containerSelector, totalPages, currentPage, onPageChange) {
  const container = document.querySelector(containerSelector);
  if (!container) return;
  
  const pageNumbers = generatePageNumbers(currentPage, totalPages);
  
  let html = '<div class="pagination-wrapper">';
  
  // ปุ่มย้อนกลับ
  html += '<button class="m-pagination-btn" ';
  if (currentPage <= 1) {
    html += 'disabled';
  } else {
    html += 'onclick="' + onPageChange + '(' + (currentPage - 1) + ')"';
  }
  html += '><i class="fas fa-chevron-left"></i> ย้อนกลับ</button>';
  
  // เลขหน้า
  html += '<div class="pagination-numbers">';
  pageNumbers.forEach(function(page) {
    if (page === '...') {
      html += '<span class="pagination-ellipsis">...</span>';
    } else {
      html += '<button class="pagination-number ';
      if (page === currentPage) html += 'active';
      html += '" onclick="' + onPageChange + '(' + page + ')">';
      html += page;
      html += '</button>';
    }
  });
  html += '</div>';
  
  // ปุ่มถัดไป
  html += '<button class="m-pagination-btn" ';
  if (currentPage >= totalPages) {
    html += 'disabled';
  } else {
    html += 'onclick="' + onPageChange + '(' + (currentPage + 1) + ')"';
  }
  html += '>ถัดไป <i class="fas fa-chevron-right"></i></button>';
  
  html += '</div>';
  
  container.innerHTML = html;
}

}

// ===== อัปเดตฟังก์ชัน handleSearch =====
function handleSearch() {
  const searchInput = document.getElementById('searchInput');
  if (!searchInput) return;
  
  const searchTerm = searchInput.value.trim();
  currentFilters.searchTerm = searchTerm;
  
  // ⭐ ถ้าไม่มีคำค้นหาและไม่มี filters = แสดงทั้งหมด
  if (!searchTerm && !currentFilters.category && !currentFilters.type) {
    // ล้าง badge
    const badge = document.querySelector('.search-result-badge');
    if (badge) badge.remove();
    
    // แสดงทั้งหมด
    filteredDocuments = [...allDocuments];
    renderDocuments(filteredDocuments);
    return;
  }
  
  // มีการค้นหา
  if (allDocuments && allDocuments.length > 0) {
    const useFuzzy = searchTerm.length >= 3;
    searchWithWorker(searchTerm, currentFilters, useFuzzy);
  } else {
    currentPage = 1;
    clearCache();
    loadDocuments();
  }
}
    // ⭐ เพิ่มฟังก์ชันนี้
function clearSearch() {
  const searchInput = document.getElementById('searchInput');
  const clearBtn = document.getElementById('clearSearchBtn');
  
  if (searchInput) {
    searchInput.value = '';
    searchInput.focus();
  }
  
  if (clearBtn) {
    clearBtn.style.display = 'none';
  }
  
  // ⭐ ล้าง badge ทันที
  const badge = document.querySelector('.search-result-badge');
  if (badge) {
    badge.remove();
  }
  
  // ล้าง search cache
  if (typeof searchCache !== 'undefined') {
    searchCache.clear();
  }
  
  // ⭐ ล้าง search term
  currentFilters.searchTerm = '';
  
  // ⭐ ตั้งค่า flag ว่ากำลังล้างการค้นหา
  window.__clearingSearch = true;
  
  // แสดงข้อมูลทั้งหมด
  filteredDocuments = [...allDocuments];
  renderDocuments(filteredDocuments);
  
  // ⭐ ยกเลิก flag หลัง render เสร็จ
  setTimeout(() => {
    window.__clearingSearch = false;
  }, 100);
  
  console.log('🔄 ล้างการค้นหาแล้ว');
}

// ===== 🔍 Search Worker System =====

let searchWorker = null;
let searchCache = new Map(); // เก็บผลค้นหาที่เคยค้นแล้ว

/**
 * สร้าง Web Worker สำหรับค้นหา
 */
function initSearchWorker() {
  if (typeof Worker === 'undefined') {
    console.warn('⚠️ Browser ไม่รองรับ Web Worker');
    return false;
  }
  
  try {
    const workerCode = `
      // Worker Code
      self.onmessage = function(e) {
        const { documents, searchTerm, filters, fuzzySearch } = e.data;
        
        // ฟังก์ชันคำนวณ Fuzzy Match Score
        function fuzzyScore(text, search) {
          if (!text || !search) return 0;
          
          text = String(text).toLowerCase();
          search = String(search).toLowerCase();
          
          if (text.includes(search)) return 100;
          
          let score = 0;
          let searchIndex = 0;
          
          for (let i = 0; i < text.length; i++) {
            if (text[i] === search[searchIndex]) {
              score += 1;
              searchIndex++;
              if (searchIndex === search.length) break;
            }
          }
          
          return Math.round((score / search.length) * 100);
        }
        
        // ⭐ ฟังก์ชันแปลงค่าเป็น String ที่ปลอดภัย
        function safeString(value) {
          if (value === null || value === undefined) return '';
          if (typeof value === 'string') return value;
          if (typeof value === 'number') return String(value);
          if (typeof value === 'object') {
            try {
              return JSON.stringify(value);
            } catch (e) {
              return '';
            }
          }
          return String(value);
        }
        
        // ฟังก์ชันค้นหา
        const results = documents
          .map(doc => {
            // ⭐ สร้าง searchable text โดยใช้ safeString
            const searchableText = [
              safeString(doc.title),
              safeString(doc.submitter_name),
              safeString(doc.description),
              safeString(doc.tags),
              safeString(doc.category),
              safeString(doc.document_type)
            ].join(' ').toLowerCase();
            
            // ตรวจสอบ filters
            const matchesCategory = !filters.category || doc.category === filters.category;
            const matchesType = !filters.type || doc.document_type === filters.type;
            
            if (!matchesCategory || !matchesType) {
              return null;
            }
            
            // ตรวจสอบ search term
            if (!searchTerm) {
              return { doc, score: 100, matches: [] };
            }
            
            const search = String(searchTerm).toLowerCase();
            
            // คำนวณคะแนน
            let score = 0;
            const matches = [];
            
            // ⭐ ค้นหาในแต่ละฟิลด์ด้วย safeString
            const fields = [
              { name: 'title', value: safeString(doc.title), weight: 3 },
              { name: 'tags', value: safeString(doc.tags), weight: 2 },
              { name: 'category', value: safeString(doc.category), weight: 1.5 },
              { name: 'submitter_name', value: safeString(doc.submitter_name), weight: 1.5 },
              { name: 'description', value: safeString(doc.description), weight: 1 },
              { name: 'document_type', value: safeString(doc.document_type), weight: 1 }
            ];
            
            for (const field of fields) {
              // ⭐ ข้าม field ที่ว่าง
              if (!field.value || field.value.trim() === '') continue;
              
              const fieldText = field.value.toLowerCase(); // แต่ field.value ผ่าน safeString() แล้ว
              
              if (fuzzySearch) {
                const fieldScore = fuzzyScore(fieldText, search);
                if (fieldScore > 30) {
                  score += fieldScore * field.weight;
                  matches.push({ field: field.name, score: fieldScore });
                }
              } else {
                if (fieldText.includes(search)) {
                  score += 100 * field.weight;
                  matches.push({ field: field.name, score: 100 });
                }
              }
            }
            
            if (score > 0 || !searchTerm) {
              return { doc, score, matches };
            }
            
            return null;
          })
          .filter(item => item !== null)
          .sort((a, b) => b.score - a.score);
        
        self.postMessage({ 
          results: results.map(item => item.doc),
          stats: {
            total: results.length,
            scores: results.map(item => ({ 
              id: item.doc.id, 
              score: item.score, 
              matches: item.matches 
            }))
          }
        });
      };
    `;
    
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    searchWorker = new Worker(URL.createObjectURL(blob));
    
    searchWorker.onmessage = function(e) {
      const { results, stats } = e.data;
      handleSearchResults(results, stats);
    };
    
    searchWorker.onerror = function(error) {
      console.error('❌ Search Worker Error:', error);
      console.warn('⚠️ กลับไปใช้การค้นหาแบบปกติ');
      handleSearchRegular();
    };
    
    console.log('✅ Search Worker initialized');
    return true;
    
  } catch (error) {
    console.error('❌ Failed to create Search Worker:', error);
    return false;
  }
}
/**
 * ค้นหาด้วย Web Worker
 */
function searchWithWorker(searchTerm, filters, fuzzySearch = false) {
  if (!searchWorker) {
    console.warn('⚠️ Worker not available, using regular search');
    handleSearchRegular();
    return;
  }
  
  // เช็ค cache
  const cacheKey = JSON.stringify({ searchTerm, filters, fuzzySearch });
  if (searchCache.has(cacheKey)) {
    console.log('✅ ใช้ผลค้นหาจาก Cache');
    const cached = searchCache.get(cacheKey);
    handleSearchResults(cached.results, cached.stats);
    return;
  }
  
  // แสดง Loading
  showSearchLoading();
  
  // ส่งงานไปให้ Worker
  searchWorker.postMessage({
    documents: allDocuments,
    searchTerm: searchTerm,
    filters: filters,
    fuzzySearch: fuzzySearch
  });
  
  // บันทึกลง cache
  searchWorker.onmessage = function(e) {
    const { results, stats } = e.data;
    searchCache.set(cacheKey, { results, stats });
    
    // ล้าง cache เก่าถ้ามีมากกว่า 50 รายการ
    if (searchCache.size > 50) {
      const firstKey = searchCache.keys().next().value;
      searchCache.delete(firstKey);
    }
    
    handleSearchResults(results, stats);
  };
}

/**
 * Fallback: ค้นหาแบบปกติ (ไม่ใช้ Worker)
 */
function handleSearchRegular() {
  const searchInput = document.getElementById('searchInput');
  const searchTerm = searchInput ? searchInput.value.trim() : '';
  
  // ⭐ ฟังก์ชัน helper
  function safeString(value) {
    if (value === null || value === undefined) return '';
    return String(value);
  }
  
  if (!searchTerm && !currentFilters.category && !currentFilters.type) {
    filteredDocuments = allDocuments;
    renderDocuments(filteredDocuments);
    return;
  }
  
  filteredDocuments = allDocuments.filter(doc => {
    // ⭐ ใช้ safeString
    const searchableText = [
      safeString(doc.title),
      safeString(doc.submitter_name),
      safeString(doc.description),
      safeString(doc.tags),
      safeString(doc.category),
      safeString(doc.document_type)
    ].join(' ').toLowerCase();
    
    const matchesSearch = !searchTerm || 
      searchableText.includes(searchTerm.toLowerCase());
    
    const matchesCategory = !currentFilters.category || 
      doc.category === currentFilters.category;
    
    const matchesType = !currentFilters.type || 
      doc.document_type === currentFilters.type;
    
    return matchesSearch && matchesCategory && matchesType;
  });
  
  renderDocuments(filteredDocuments);
  showSearchResultCount(filteredDocuments.length);
}

// ⭐ ฟังก์ชันกรอกข้อมูลในฟอร์ม (แยกออกมา)
function fillEditForm(doc) {
  document.getElementById('edit_doc_id').value = doc.id;
  document.getElementById('edit_title').value = doc.title;
  document.getElementById('edit_category').value = doc.category;
  document.getElementById('edit_document_type').value = doc.document_type;
  
  // Format date
  if (doc.document_date) {
    const dateParts = doc.document_date.split(' ');
    if (dateParts.length > 0) {
      const monthMap = {
        'มกราคม': '01', 'กุมภาพันธ์': '02', 'มีนาคม': '03', 'เมษายน': '04',
        'พฤษภาคม': '05', 'มิถุนายน': '06', 'กรกฎาคม': '07', 'สิงหาคม': '08',
        'กันยายน': '09', 'ตุลาคม': '10', 'พฤศจิกายน': '11', 'ธันวาคม': '12'
      };
      
      const day = dateParts[0];
      const month = monthMap[dateParts[1]];
      const year = parseInt(dateParts[2]) - 543;
      
      if (day && month && year) {
        document.getElementById('edit_document_date').value = 
          `${year}-${month}-${day.padStart(2, '0')}`;
      }
    }
  }
  
  document.getElementById('edit_submitter_name').value = doc.submitter_name;
  document.getElementById('edit_tags').value = doc.tags || '';
  document.getElementById('edit_description').value = doc.description || '';
  
  // ⭐ แสดงไฟล์ที่อัปโหลด
  displayEditFiles(doc);
}

// ⭐ ฟังก์ชันแสดงไฟล์ใน Edit Modal
function displayEditFiles(doc) {
  const fileListContainer = document.getElementById('edit_file_list');
  if (!fileListContainer) return;
  
  // ตรวจสอบว่ามีไฟล์หรือไม่
  let files = [];
  try {
    if (doc.file_objects_json) {
      files = JSON.parse(doc.file_objects_json);
    }
  } catch (e) {
    console.error('Error parsing file_objects_json:', e);
  }
  
  if (!files || files.length === 0) {
    fileListContainer.className = 'file-list-container empty';
    fileListContainer.innerHTML = '<i class="fas fa-inbox"></i> ไม่มีไฟล์แนบ';
    return;
  }
  
  // แสดงรายการไฟล์
  fileListContainer.className = 'file-list-container';
  let html = '';
  
  files.forEach(function(file, index) {
    const fileIcon = getFileIcon(file.mimeType || file.type);
    const fileName = file.name || 'ไฟล์ ' + (index + 1);
    
    html += '<div class="file-item">';
    html += '  <div class="file-item-icon">' + fileIcon + '</div>';
    html += '  <div class="file-item-info">';
    html += '    <div class="file-item-name">' + escapeHtml(fileName) + '</div>';
    
    if (file.url || file.webViewLink) {
      const fileUrl = file.url || file.webViewLink;
      html += '    <a href="' + escapeHtml(fileUrl) + '" target="_blank" class="file-item-link">';
      html += '      <i class="fas fa-external-link-alt"></i> เปิดไฟล์';
      html += '    </a>';
    }
    
    html += '  </div>';
    html += '</div>';
  });
  
  fileListContainer.innerHTML = html;
}

// ⭐ ฟังก์ชันแสดงไอคอนไฟล์ตาม MIME type
function getFileIcon(mimeType) {
  if (!mimeType) return '📄';
  
  if (mimeType.includes('pdf')) return '📕';
  if (mimeType.includes('word') || mimeType.includes('document')) return '📘';
  if (mimeType.includes('sheet') || mimeType.includes('excel')) return '📗';
  if (mimeType.includes('presentation') || mimeType.includes('powerpoint')) return '📙';
  if (mimeType.includes('image')) return '🖼️';
  if (mimeType.includes('video')) return '🎥';
  if (mimeType.includes('audio')) return '🎵';
  if (mimeType.includes('zip') || mimeType.includes('rar') || mimeType.includes('compressed')) return '📦';
  
  return '📄';
}

function deleteDocument(docId) {
  Swal.fire({
    title: '🔐 ยืนยันการลบ',
    text: 'กรุณาใส่รหัสผ่าน Admin เพื่อยืนยัน',

    inputAttributes: {

    },
    icon: 'warning',

    cancelButtonColor: '#6c757d',
    confirmButtonText: 'ลบเลย',
    cancelButtonText: 'ยกเลิก',
    showLoaderOnConfirm: true,
    
    // ⭐ รองรับปุ่ม Enter และแก้ Z-Index
    didOpen: function() {
      // แก้ Z-Index ให้สูงสุด
      var container = Swal.getContainer();
      if (container) {
        container.style.setProperty('z-index', '99999', 'important');
      }
      
      // โฟกัสช่องรหัสผ่าน + ดักจับปุ่ม Enter
      var input = Swal.getInput();
      if (input) {
        input.focus();
        input.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            Swal.clickConfirm();
          }
        });
      }
    },
    
    preConfirm: function(password) {
      if (!password) {
        Swal.showValidationMessage('กรุณาใส่รหัสผ่าน');
        return false;
      }
      
      // ⭐ เรียกฟังก์ชันลบด้วยรหัสผ่าน
      return deleteDocumentWithPassword(docId, password)
        .catch(function(error) {
          Swal.showValidationMessage(error.message || 'เกิดข้อผิดพลาด');
        });
    },
    
    allowOutsideClick: function() {
      return !Swal.isLoading();
    }
    
  }).then(function(result) {
    if (result.isConfirmed) {
      // ✅ ลบสำเร็จ - แสดงข้อความ
      Swal.fire({
        icon: 'success',
        title: 'ลบสำเร็จ!',

      });
      
      // โหลดข้อมูลใหม่
      clearCache();
      loadDocuments(true);

    }
  });
}

/**
 * ✅ ฟังก์ชันลบเอกสารด้วยรหัสผ่าน (รองรับ Promise)
 */
function deleteDocumentWithPassword(docId, password) {
  return new Promise(function(resolve, reject) {
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.success) {
          resolve(result);
        } else {
          reject(new Error(result.error || 'ลบไม่สำเร็จ'));
        }
      })
      .withFailureHandler(function(error) {
        reject(error);
      })
      .deleteDocumentWithPassword(docId, password);
  });
}


// ⭐ ฟังก์ชันลบแบบ Optimistic UI
// ⭐ ฟังก์ชันลบแบบ Optimistic UI พร้อมรหัสผ่าน
async function deleteDocumentOptimisticWithPassword(docId, password) {
  // หา Element ของเอกสาร
  const docElement = document.querySelector(`[data-id="${docId}"]`) || 
                     document.querySelector(`[onclick*="viewDocument(${docId})"]`)?.closest('.document-card, .document-list-item');
  
  // เพิ่ม Fade Out Animation
  if (docElement) {
    docElement.style.transition = 'all 0.3s ease';
    docElement.style.opacity = '0';
    docElement.style.transform = 'scale(0.9)';
    await new Promise(resolve => setTimeout(resolve, 300));
  }
  
  // 1. หาเอกสารที่จะลบ
  const docIndex = allDocuments.findIndex(d => d.id == docId);
  
  if (docIndex === -1) {
    throw new Error('ไม่พบเอกสาร');
  }
  
  // 2. เก็บข้อมูลเดิมไว้ (สำหรับ Rollback)
  const deletedDoc = allDocuments[docIndex];
  const deletedDocCopy = { ...deletedDoc };
  
  // 3. ⚡ ลบออกจาก UI ทันที
  allDocuments.splice(docIndex, 1);
  filteredDocuments = [...allDocuments];
  
  // อัปเดต UI ทันที
  renderDocuments(filteredDocuments);
  
  // แสดง Toast กำลังลบ
  const loadingToast = Swal.fire({
    toast: true,
    position: 'top-end',
    icon: 'info',
    title: 'กำลังลบ...',
    showConfirmButton: false,
    timer: 30000,
    didOpen: () => {
      Swal.showLoading();
    }
  });
  
  try {
    // 4. ส่ง Request พร้อมรหัสผ่านไปที่ Server
    const result = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .deleteDocumentWithPassword(docId, password);
    });
    
    // 5. ตรวจสอบผลลัพธ์
    if (result.success) {
      // ✅ สำเร็จ - ล้าง Cache และอัปเดต Stats
      clearCache();
      loadStatistics();
      
      loadingToast.close();
      
      // แสดงข้อความสำเร็จ
      Swal.fire({
        toast: true,
        position: 'top-end',
        icon: 'success',
        title: '✅ ลบเอกสารสำเร็จ',
        showConfirmButton: false,
        timer: 2000
      });
      
      console.log('✅ ลบเอกสารสำเร็จ:', deletedDoc.title);
      
    } else {
      // ❌ ล้มเหลว - Rollback (รหัสผ่านผิดหรือเกิดข้อผิดพลาด)
      const errorMsg = result.error || 'ไม่สามารถลบได้';
      console.error('❌ Delete failed:', errorMsg);
      throw new Error(errorMsg);
    }
    
  } catch (error) {
    // ❌ เกิดข้อผิดพลาด - Rollback
    console.error('❌ ลบเอกสารล้มเหลว:', error);
    
    // เอาข้อมูลกลับมา
    allDocuments.splice(docIndex, 0, deletedDocCopy);
    filteredDocuments = [...allDocuments];
    renderDocuments(filteredDocuments);
    
    loadingToast.close();
    
    // แสดงข้อความผิดพลาด
    const errorMessage = error.message || 'ไม่สามารถลบเอกสารได้';
    Swal.fire({
      icon: 'error',
      title: 'ลบไม่สำเร็จ',
      text: errorMessage,
      confirmButtonColor: '#dc3545'
    });
    
    throw error;
  }
}

         Math.floor((Date.now() - documentsCache.timestamp) / 1000) : 0,

  };

}

function handleAddDocument(event) {

  const form = event.target;

  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }
  
  // ⭐ แสดง Toast แจ้งเตือนทันที (ไม่บล็อก UI)
  Swal.fire({
    toast: true,
    position: 'top-end',
    icon: 'info',
    title: '⏳ กำลังตรวจสอบข้อมูล...',
    showConfirmButton: false,
    timer: 1500,
    timerProgressBar: true,
    didOpen: () => {
      Swal.showLoading();
    }
  });
  
  // ⭐ Disable ปุ่มบันทึก + แสดงสถานะ
  const submitBtn = form.querySelector('button[type="submit"]');
  const cancelBtn = document.querySelector('.btn-cancel');
  
  if (submitBtn) {

    submitBtn.style.opacity = '0.6';
    submitBtn.style.cursor = 'not-allowed';
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';
  }
  
  if (cancelBtn) {
    cancelBtn.disabled = true;
    cancelBtn.style.opacity = '0.6';
  }
  
  // ⭐ ใช้ requestAnimationFrame เพื่อให้ UI update ก่อน
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      try {
        const documentData = {
          title: document.getElementById('add_title').value,
          category: document.getElementById('add_category').value,
          document_type: document.getElementById('add_document_type').value,
          document_date: document.getElementById('add_document_date').value,
          submitter_name: document.getElementById('add_submitter_name').value,
          tags: document.getElementById('add_tags').value,
          description: document.getElementById('add_description').value
        };
        
        console.log('📝 ข้อมูลที่จะส่ง:', documentData);
        
        // เปลี่ยนข้อความ Toast
        Swal.update({
          title: '💾 กำลังบันทึกเอกสาร...',
          timer: 30000
        });
        
        // เช็ค URL/ไฟล์
        const urlInput = document.getElementById('urlInput');
        const hasUrls = urlInput && urlInput.value.trim().length > 0;
        const hasFiles = selectedFiles && selectedFiles.length > 0;
        
        console.log('🔗 มี URL:', hasUrls);
        console.log('📁 มีไฟล์:', hasFiles);
        
        // ดำเนินการ
        if (hasUrls) {
          if (submitBtn) submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังประมวลผล URL...';
          Swal.update({ title: '🔗 กำลังประมวลผล URL...' });
          handleUrlUpload(documentData);
        } else if (hasFiles) {
          if (!validateFileSize()) {
            enableSubmitButton();
            return;
          }
          if (submitBtn) submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังอัปโหลดไฟล์...';
          Swal.update({ title: '📤 กำลังอัปโหลดไฟล์...' });
          handleFileUpload(documentData);
        } else {
          if (submitBtn) submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';
          Swal.update({ title: '💾 กำลังบันทึกเอกสาร...' });
          addDocumentToSheet(documentData);
        }
        
      } catch (error) {
        console.error('❌ Error:', error);
        enableSubmitButton();
        
        Swal.fire({
          icon: 'error',
          title: 'เกิดข้อผิดพลาด',
          text: error.message,

        });

    });
  });
}

// เรียกฟังก์ชันนี้ "ภายใน" handleUrlUpload()
function collectUrlsFromUI() {
  const out = [];

  // 1) textarea หลัก
  const ta = document.querySelector('#urlInput, #urlTextarea, textarea[name="urls"]');
  if (ta && ta.value) {
    ta.value
      .split(/[\n,;]+/)
      .map(s => (s || '').trim())
      .filter(Boolean)
      .forEach(u => out.push(u));
  }

  // 2) อินพุตย่อย/ชิป ถ้ามี
  document.querySelectorAll('.url-item input[type="text"], .url-chip[data-url]')
    .forEach(el => {
      const v = (el.dataset.url || el.value || '').trim();
      if (v) out.push(v);
    });

  // 3) เดดิวพ์ + แปลงเป็นสตริงชัวร์ ๆ
  return Array.from(new Set(out.map(x => String(x))));
}

async function handleUrlUpload(documentData) {
  console.log('🔗 handleUrlUpload', documentData);

  const rawUrls = collectUrlsFromUI();
  if (!rawUrls.length) {
    showError('กรุณาระบุ URL อย่างน้อย 1 รายการ');
    enableSubmitButton();
    return;
  }

  const category = String(documentData?.category || '').trim();

  google.script.run
    .withSuccessHandler((res) => {
      const items = Array.isArray(res) ? res : (res && res.data) || [];

      // มีสักรายการที่ success ไหม
      const ok = items.some(x => x && x.success);
      if (!ok) {
        const firstErr = items.find(x => x && x.error);
        showError('อัปโหลดจาก URL ล้มเหลว' + (firstErr ? `: ${firstErr.error}` : ''));
        enableSubmitButton();
        return;
      }

      // 🔗 map ผลลัพธ์จาก server → file_objects[]
      const files = items
        .filter(x => x && x.success)
        .map(x => ({
          name: x.fileName || x.name || 'ไฟล์',
          url:  x.previewUrl || x.fileUrl || x.url || '',
          fileUrl: x.fileUrl || x.url || '',
          previewUrl: x.previewUrl || ''
        }));

      // ✅ รวมเข้ากับข้อมูลแบบฟอร์ม แล้วบันทึกลงชีต
      documentData.file_objects_json = JSON.stringify(files);
      addDocumentToSheet(documentData);
    })
    .withFailureHandler(err => {
      showError('อัปโหลดจาก URL ล้มเหลว: ' + ((err && err.message) || err));
      enableSubmitButton();
    })
    .uploadMultipleFilesFromUrls(rawUrls, category); // ใช้ compat เสมอ
}

// ⭐ ฟังก์ชันเพิ่มไฟล์เข้า Array
function addFilesToList(files) {
  const maxSize = 500 * 1024 * 1024; // 500MB

  for (const file of files) {
    if (file.size > maxSize) {
      showError(`ไฟล์ "${file.name}" มีขนาดใหญ่เกิน 500MB`);
      continue;
    }

    // หาไฟล์ชื่อซ้ำใน selectedFiles (เทียบตามชื่อไฟล์)
    const dupIndexByName = selectedFiles.findIndex(f => f.name === file.name);

    if (dupIndexByName !== -1) {
      // แทนที่ไฟล์เดิมด้วยไฟล์ใหม่ (เงียบ ๆ ไม่ฟ้อง)
      selectedFiles.splice(dupIndexByName, 1, file);
    } else {
      // เพิ่มไฟล์ใหม่
      selectedFiles.push(file);
    }
  }

  // อัปเดต UI
  displayAllFiles();

  const uploadArea = document.getElementById('fileUploadArea');
  if (uploadArea && selectedFiles.length > 0) {
    uploadArea.classList.add('has-file');
  }
}

// ===== เพิ่มในฟังก์ชัน displayAllFiles (หาบรรทัดที่มี fileNameDisplay.style.display = 'block';) =====

function displayAllFiles() {
  const fileNameDisplay = document.getElementById('fileNameDisplay');
  const container = document.getElementById('fileListContainer');

  if (!container || !fileNameDisplay) return;

  if (selectedFiles.length === 0) {
    fileNameDisplay.style.display = 'none';
    container.innerHTML = '';
    return;
  }

  container.innerHTML = '';

  const iconMap = {
    'pdf':'📕','doc':'📘','docx':'📘',
    'xls':'📗','xlsx':'📗','ppt':'📙','pptx':'📙',
    'jpg':'🖼️','jpeg':'🖼️','png':'🖼️','gif':'🖼️',
    'mp4':'🎬','mov':'🎬','avi':'🎬','mkv':'🎬','wmv':'🎬',
    'zip':'📦','rar':'📦'
  };

  // ⭐ คำนวณขนาดรวม
  let totalSize = 0;
  selectedFiles.forEach(file => totalSize += file.size);
  const totalSizeMB = (totalSize / (1024*1024)).toFixed(2);

  selectedFiles.forEach((file, index) => {
    const sizeMB = (file.size / (1024*1024)).toFixed(2);
    const sizeKB = (file.size / 1024).toFixed(2);
    const sizeText = (file.size >= 1024*1024) ? `${sizeMB} MB` : `${sizeKB} KB`;
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    const icon = iconMap[ext] || '📄';

    container.insertAdjacentHTML('beforeend', `
      <div class="file-list-item" id="file-item-${index}">
        <div class="file-icon">${icon}</div>
        <div class="file-details">
          <div class="file-name">${escapeHtml(file.name)}</div>
          <div class="file-size">${sizeText}</div>
        </div>
        <button type="button" class="remove-file-btn" onclick="removeSingleFile(${index})">
          <i class="fas fa-times"></i>
        </button>
      </div>
    `);
  });

  // ⭐ แสดงขนาดรวม
  container.insertAdjacentHTML('beforeend', `
    <div style="
      margin-top: 12px;
      padding: 12px;
      background: #e3f2fd;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      color: #1565c0;
    ">
      <i class="fas fa-info-circle"></i> 
      จำนวนทั้งหมด: ${selectedFiles.length} ไฟล์ 
      (${totalSizeMB} MB)
    </div>
  `);

  fileNameDisplay.style.display = 'block';
}

// ===== เพิ่มฟังก์ชันนี้ใหม่ (วางหลัง displayAllFiles) =====

function validateFileSize() {
  const MAX_SINGLE_FILE = 500 * 1024 * 1024; // 500MB ต่อไฟล์
  const MAX_TOTAL_SIZE = 2 * 1024 * 1024 * 1024; // 2GB รวมทั้งหมด
  
  let totalSize = 0;
  const oversizedFiles = [];
  
  selectedFiles.forEach(file => {
    totalSize += file.size;
    if (file.size > MAX_SINGLE_FILE) {
      oversizedFiles.push(file.name);
    }
  });
  
  // เช็คไฟล์ใหญ่เกินไป
  if (oversizedFiles.length > 0) {
    Swal.fire({
      icon: 'error',
      title: 'ไฟล์ใหญ่เกินไป',
      html: `
        <p>ไฟล์เหล่านี้มีขนาดเกิน 500MB:</p>
        <ul style="text-align:left; max-height:200px; overflow:auto;">
          ${oversizedFiles.map(name => `<li>${escapeHtml(name)}</li>`).join('')}
        </ul>
        <p><small>กรุณาลบไฟล์เหล่านี้ออกก่อนอัปโหลด</small></p>
      `
    });
    return false;
  }
  
  // เช็คขนาดรวม
  if (totalSize > MAX_TOTAL_SIZE) {
    const totalGB = (totalSize / (1024*1024*1024)).toFixed(2);
    Swal.fire({
      icon: 'warning',
      title: 'ขนาดรวมเกินไป',
      html: `
        <p>ขนาดรวมทั้งหมด: <strong>${totalGB} GB</strong></p>
        <p>ขนาดสูงสุด: <strong>2 GB</strong></p>
        <p>กรุณาลดจำนวนไฟล์</p>
      `
    });
    return false;
  }
  
  return true;
}

/**
 * ลบไฟล์ทีละรายการตาม index
 */
function removeSingleFile(index) {
  if (index >= 0 && index < selectedFiles.length) {
    selectedFiles.splice(index, 1);
    displayAllFiles();

    if (selectedFiles.length === 0) {
      const area = document.getElementById('fileUploadArea');
      if (area) area.classList.remove('has-file');
    }
  }
}

/**
 * ลบไฟล์ทั้งหมด
 * - ผูกกับปุ่ม "ลบทั้งหมด" เดิม (removeFile() เรียกฟังก์ชันนี้ต่อได้)
 */
function removeAllFiles() {
  selectedFiles = [];

  const fileInput = document.getElementById('add_file');
  const fileInputMore = document.getElementById('add_file_more');
  if (fileInput) fileInput.value = '';
  if (fileInputMore) fileInputMore.value = '';

  const area = document.getElementById('fileUploadArea');
  const list = document.getElementById('fileListContainer');
  const box  = document.getElementById('fileNameDisplay');

  if (area) area.classList.remove('has-file');
  if (list) list.innerHTML = '';
  if (box)  box.style.display = 'none';
}

 */
function handleFileUploadWithPath(documentData) {
  if (!selectedFiles || selectedFiles.length === 0) {
    addDocumentToSheet(documentData);
    return;
  }

  window.__uploadStartTime = Date.now();
  
  // แสดง Progress
  showProgressOnModal('กำลังเตรียมอัปโหลด...', 0, `${selectedFiles.length} ไฟล์`);
  
  const MAX_CONCURRENT = 5; // ลดลงเพราะมี Path processing
  let completedCount = 0;
  const failedFiles = [];
  const successFiles = [];
  
  // ⭐ ฟังก์ชันอัปโหลดไฟล์เดี่ยวพร้อม Path (รองรับ chunked upload สำหรับไฟล์ใหญ่)
  async function uploadSingleFileWithPath(file) {
    try {
      const relativePath = file._relativePath || file.webkitRelativePath || '';
      const isLarge = file.size > LARGE_FILE_THRESHOLD;
      
      if (isLarge) {
        // ⭐ ไฟล์ใหญ่ → ใช้ Chunked Upload
        console.log(`📦 ไฟล์ใหญ่+Path (${(file.size/1024/1024).toFixed(1)} MB): ${file.name} → Chunked Upload`);
        
        const result = await uploadFileChunked(
          file,
          documentData.category,
          (chunkDone, chunkTotal) => {
            const percent = Math.round((completedCount / selectedFiles.length) * 100);
            showProgressOnModal(
              `อัปโหลด ${file.name} (chunk ${chunkDone}/${chunkTotal})...`,
              percent,
              `เสร็จแล้ว ${completedCount}/${selectedFiles.length} ไฟล์`
            );
          }
        );
        
        completedCount++;
        const percent = Math.round((completedCount / selectedFiles.length) * 100);
        showProgressOnModal('กำลังอัปโหลดไฟล์...', percent, `เสร็จแล้ว ${completedCount}/${selectedFiles.length} ไฟล์`);
        
        return {
          name: file.name,
          url: result.fileUrl,
          fileUrl: result.fileUrl,
          path: relativePath,
          size: file.size,
          mimeType: result.mimeType
        };
      }
      
      // ไฟล์เล็ก → ใช้วิธีเดิม
      const fileData = await readFileAsDataURL(file);
      
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler((result) => {
            if (result.success) {
              completedCount++;
              const percent = Math.round((completedCount / selectedFiles.length) * 100);
              
              showProgressOnModal(
                'กำลังอัปโหลดไฟล์...',
                percent,
                `เสร็จแล้ว ${completedCount}/${selectedFiles.length} ไฟล์`
              );
              
              resolve({ 
                name: file.name, 
                url: result.fileUrl,
                fileUrl: result.fileUrl,
                path: relativePath,
                folderId: result.folderId,
                folderName: result.folderName,
                size: file.size,
                mimeType: result.mimeType
              });
            } else {
              reject(new Error(result.error || 'Upload failed'));
            }
          })
          .withFailureHandler((error) => {
            reject(error);
          })
          .uploadSingleFileWithPath(
            fileData,
            file.name,
            file.type || 'application/octet-stream',
            relativePath,
            documentData.category
          );
      });
    } catch (error) {
      throw error;
    }
  }
  
  // ⭐ Queue สำหรับอัปโหลดพร้อมกัน
  async function uploadWithQueue(files, maxConcurrent) {
    const queue = [...files];
    const executing = [];
    
    for (const file of queue) {
      const promise = uploadSingleFileWithPath(file)
        .then(result => {
          successFiles.push(result);
          return result;
        })
        .catch(error => {
          failedFiles.push({ 
            name: file.name, 
            path: file._relativePath || '',
            error: error.message 
          });
          console.error(`❌ อัปโหลด ${file.name} ล้มเหลว:`, error);
          return null;
        })
        .finally(() => {
          executing.splice(executing.indexOf(promise), 1);
        });
      
      executing.push(promise);
      
      if (executing.length >= maxConcurrent) {
        await Promise.race(executing);
      }
    }
    
    return Promise.all(executing);
  }
  
  // เริ่มอัปโหลด
  (async function() {
    try {
      await uploadWithQueue(selectedFiles, MAX_CONCURRENT);
      
      if (failedFiles.length > 0 && successFiles.length > 0) {
        // บางไฟล์สำเร็จ บางไฟล์ล้มเหลว
        Swal.fire({
          icon: 'warning',
          title: 'อัปโหลดบางส่วนสำเร็จ',
          html: `
            <p>สำเร็จ ${successFiles.length} ไฟล์ / ล้มเหลว ${failedFiles.length} ไฟล์</p>
            <details style="text-align:left; margin-top:12px;">
              <summary style="cursor:pointer; color:#dc3545;">ดูไฟล์ที่ล้มเหลว</summary>
              <ul style="max-height:150px; overflow:auto; font-size:13px;">
                ${failedFiles.map(f => `<li>${escapeHtml(f.name)}: ${escapeHtml(f.error)}</li>`).join('')}
              </ul>
            </details>
          `,
          confirmButtonText: 'บันทึกเฉพาะที่สำเร็จ',
          showCancelButton: true,
          cancelButtonText: 'ยกเลิก'
        }).then((result) => {
          if (result.isConfirmed) {
            documentData.file_objects = successFiles;
            addDocumentToSheet(documentData);
          } else {
            enableSubmitButton();
          }
        });
        
      } else if (failedFiles.length > 0) {
        // ทุกไฟล์ล้มเหลว
        showErrorOnFooter(`อัปโหลดล้มเหลวทั้งหมด ${failedFiles.length} ไฟล์`);
        enableSubmitButton();
        
      } else {
        // สำเร็จทั้งหมด
        console.log('✅ อัปโหลดสำเร็จทั้งหมด:', successFiles.length, 'ไฟล์');
        
        // ⭐ จัดกลุ่มตาม Folder
        const folderGroups = {};
        successFiles.forEach(file => {
          const folderName = file.folderName || 'root';
          if (!folderGroups[folderName]) {
            folderGroups[folderName] = [];
          }
          folderGroups[folderName].push(file);
        });
        
        console.log('📁 จัดกลุ่มโฟลเดอร์:', Object.keys(folderGroups));
        
        documentData.file_objects = successFiles;
        addDocumentToSheet(documentData);
      }
      
    } catch (error) {
      console.error('❌ Upload error:', error);
      showErrorOnFooter('เกิดข้อผิดพลาดในการอัปโหลด: ' + error.message);
      enableSubmitButton();
    }
  })();
}

// ===================================================================
// ⭐ CHUNKED UPLOAD - แก้ปัญหา HTTP 413 (Payload Too Large)
// ===================================================================

// ขนาด chunk สำหรับ base64 (~5MB raw = ~6.7MB base64, ปลอดภัยต่อลิมิต google.script.run)
const CHUNK_SIZE_BYTES = 5 * 1024 * 1024; // 5MB per chunk (raw bytes)
const LARGE_FILE_THRESHOLD = 20 * 1024 * 1024; // ไฟล์ > 20MB ใช้ chunked upload

/**
 * ⭐ อ่านไฟล์เป็น ArrayBuffer
 */
function readFileAsArrayBuffer(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

/**
 * ⭐ แปลง ArrayBuffer เป็น Base64 string
 */
function arrayBufferToBase64(buffer) {
  let binary = '';
  const bytes = new Uint8Array(buffer);
  const len = bytes.byteLength;
  for (let i = 0; i < len; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

/**
 * ⭐ อัปโหลดไฟล์ใหญ่แบบ Chunked
 */
async function uploadFileChunked(file, category, onProgress) {
  const arrayBuffer = await readFileAsArrayBuffer(file);
  const totalBytes = arrayBuffer.byteLength;
  const totalChunks = Math.ceil(totalBytes / CHUNK_SIZE_BYTES);
  
  console.log(`📦 Chunked upload: ${file.name} (${(totalBytes/1024/1024).toFixed(2)} MB, ${totalChunks} chunks)`);
  
  // 1) เริ่ม session
  const startResult = await new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject)
      .startChunkedUpload(file.name, totalChunks, file.type || 'application/octet-stream', category);
  });
  
  if (!startResult.success) {
    throw new Error('Start chunked upload failed: ' + (startResult.error || 'Unknown'));
  }
  
  const uploadId = startResult.uploadId;
  
  // 2) ส่ง chunks ทีละชิ้น (sequential เพื่อความเสถียร)
  for (let i = 0; i < totalChunks; i++) {
    const start = i * CHUNK_SIZE_BYTES;
    const end = Math.min(start + CHUNK_SIZE_BYTES, totalBytes);
    const chunkBuffer = arrayBuffer.slice(start, end);
    const chunkBase64 = arrayBufferToBase64(chunkBuffer);
    
    const chunkResult = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .uploadChunk(uploadId, i, chunkBase64);
    });
    
    if (!chunkResult.success) {
      throw new Error('Chunk ' + i + ' failed: ' + (chunkResult.error || 'Unknown'));
    }
    
    if (onProgress) {
      onProgress(i + 1, totalChunks);
    }
    
    console.log(`📦 Chunk ${i + 1}/${totalChunks} sent`);
  }
  
  // 3) รวม chunks เป็นไฟล์สุดท้าย
  const finishResult = await new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject)
      .finishChunkedUpload(uploadId);
  });
  
  if (!finishResult.success) {
    throw new Error('Finish chunked upload failed: ' + (finishResult.error || 'Unknown'));
  }
  
  console.log(`✅ Chunked upload complete: ${file.name}`);
  return finishResult;
}

// ฟังก์ชันอัปโหลดไฟล์ปกติ (รองรับ chunked upload สำหรับไฟล์ใหญ่)
async function uploadRegularFiles(documentData) {
  window.__uploadStartTime = Date.now();
  showProgressOnModal('กำลังเตรียมอัปโหลด...', 0, `${selectedFiles.length} ไฟล์`);
  
  const MAX_CONCURRENT = 3;
  let completedCount = 0;
  const successFiles = [];
  const failedFiles = [];
  const totalFiles = selectedFiles.length;
  
  // ⭐ ฟังก์ชันอัปโหลดไฟล์เดี่ยว (เลือกวิธีตามขนาด)
  async function uploadOneFile(file) {
    const isLarge = file.size > LARGE_FILE_THRESHOLD;
    
    if (isLarge) {
      // ⭐ ไฟล์ใหญ่ → ใช้ Chunked Upload
      console.log(`📦 ไฟล์ใหญ่ (${(file.size/1024/1024).toFixed(1)} MB): ${file.name} → ใช้ Chunked Upload`);
      
      const result = await uploadFileChunked(
        file, 
        documentData.category,
        (chunkDone, chunkTotal) => {
          const fileProgress = completedCount / totalFiles;
          const chunkProgress = (chunkDone / chunkTotal) / totalFiles;
          const totalPercent = Math.round((fileProgress + chunkProgress) * 100);
          showProgressOnModal(
            `อัปโหลด ${file.name} (chunk ${chunkDone}/${chunkTotal})...`, 
            totalPercent, 
            `${completedCount}/${totalFiles} ไฟล์`
          );
        }
      );
      
      return {
        name: file.name,
        url: result.fileUrl,
        fileUrl: result.fileUrl
      };
      
    } else {
      // ไฟล์เล็ก → ใช้ Single Upload เดิม
      const fileData = await readFileAsDataURL(file);
      
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(result => {
            if (result.success) {
              resolve({
                name: file.name,
                url: result.fileUrl,
                fileUrl: result.fileUrl
              });
            } else {
              reject(new Error(result.error || 'Upload failed'));
            }
          })
          .withFailureHandler(reject)
          .uploadSingleFile(fileData, file.name, file.type, documentData.category);
      });
    }
  }
  
  // Upload แบบ batch (ไฟล์ใหญ่จะ sequential อัตโนมัติ)
  const queue = [...selectedFiles];
  const executing = [];
  
  for (const file of queue) {
    const isLarge = file.size > LARGE_FILE_THRESHOLD;
    
    // ไฟล์ใหญ่ → รอให้ทุกอย่างเสร็จก่อน แล้วอัปโหลด sequential
    if (isLarge && executing.length > 0) {
      await Promise.all(executing);
      executing.length = 0;
    }
    
    const promise = uploadOneFile(file)
      .then(result => {
        completedCount++;
        const percent = Math.round((completedCount / totalFiles) * 100);
        showProgressOnModal('กำลังอัปโหลด...', percent, `${completedCount}/${totalFiles} ไฟล์`);
        successFiles.push(result);
        return result;
      })
      .catch(error => {
        completedCount++;
        failedFiles.push({ name: file.name, error: error.message || String(error) });
        console.error(`❌ ${file.name}:`, error);
        return null;
      })
      .finally(() => {
        const idx = executing.indexOf(promise);
        if (idx > -1) executing.splice(idx, 1);
      });
    
    if (isLarge) {
      // ไฟล์ใหญ่ → รอให้เสร็จก่อนไปไฟล์ถัดไป
      await promise;
    } else {
      executing.push(promise);
      if (executing.length >= MAX_CONCURRENT) {
        await Promise.race(executing);
      }
    }
  }
  
  // รอ batch สุดท้าย
  if (executing.length > 0) {
    await Promise.all(executing);
  }
  
  // แสดงผลลัพธ์
  if (successFiles.length > 0) {
    if (failedFiles.length > 0) {
      console.warn(`⚠️ สำเร็จ ${successFiles.length}, ล้มเหลว ${failedFiles.length}`);
    }
    documentData.file_objects = successFiles;
    addDocumentToSheet(documentData);
  } else {
    showErrorOnFooter('อัปโหลดล้มเหลวทั้งหมด');
    enableSubmitButton();
  }
}


function continueWithPartialUpload() {
  if (!window.__partialUploadData) return;
  
  const { documentData, successFiles } = window.__partialUploadData;
  documentData.file_objects = successFiles;
  addDocumentToSheet(documentData);
  
  delete window.__partialUploadData;
}


// ฟังก์ชันช่วย: อ่านไฟล์เป็น DataURL
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ฟังก์ชันช่วย: หน่วงเวลา
function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

  const overlay = document.getElementById('loadingOverlay');

  if (!overlay.classList.contains('active')) {
    showLoading('กำลังอัปโหลดไฟล์...');

  if (!progressWrap) {
    overlay.innerHTML = `

        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 400px;

        <!-- Progress Container -->

          <!-- Progress Bar -->
          <div data-progress-wrap style="
            width: 100%;
            height: 16px;
            background: rgba(255,255,255,0.15);
            border-radius: 8px;

          ">
            <div data-progress style="
              width: 0%;
              height: 100%;
              background: linear-gradient(90deg, #4CAF50 0%, #66BB6A 50%, #81C784 100%);
              border-radius: 8px;
              transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
              box-shadow: 0 0 12px rgba(76,175,80,0.6);
              position: relative;
              overflow: hidden;
            ">
              <!-- Animated Shine Effect -->
              <div style="
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
                animation: shine 1.5s infinite;
              "></div>
            </div>
          </div>
          
          <!-- Progress Info -->
          <div style="margin-top: 16px; text-align: center;">
            <div data-progress-info style="
              color: white;
              font-size: 18px;
              font-weight: 700;
              text-shadow: 0 2px 4px rgba(0,0,0,0.4);
              margin-bottom: 4px;
            "></div>
            <div data-progress-percent style="
              color: rgba(255,255,255,0.9);
              font-size: 24px;
              font-weight: 700;
              text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            "></div>
            <div data-upload-speed style="
              color: rgba(255,255,255,0.7);
              font-size: 13px;
              margin-top: 8px;
            "></div>
          </div>
        </div>
      </div>
      
      <style>
        @keyframes shine {
          0% { left: -100%; }
          100% { left: 100%; }
        }
      </style>
    `;
    progressWrap = overlay.querySelector('[data-progress-wrap]');
  }
  
  const progressBar = overlay.querySelector('[data-progress]');
  const progressInfo = overlay.querySelector('[data-progress-info]');
  const progressPercent = overlay.querySelector('[data-progress-percent]');
  const uploadSpeed = overlay.querySelector('[data-upload-speed]');
  
  const percent = Math.round((completed / total) * 100);
  
  // Update progress bar
  if (progressBar) {
    progressBar.style.width = percent + '%';
    
    if (percent >= 90) {
      progressBar.style.background = 'linear-gradient(90deg, #66BB6A 0%, #4CAF50 100%)';
    }
  }
  
  // Update text
  if (progressInfo) {
    progressInfo.textContent = `${completed} / ${total} ไฟล์`;
  }
  
  if (progressPercent) {
    progressPercent.textContent = `${percent}%`;
  }
  
  // คำนวณความเร็ว
  if (uploadSpeed && window.__uploadStartTime) {
    const elapsed = (Date.now() - window.__uploadStartTime) / 1000;
    const speed = (completed / elapsed).toFixed(1);
    const remaining = Math.ceil((total - completed) / speed);
    
    if (completed > 0 && remaining > 0) {
      uploadSpeed.textContent = `ความเร็ว: ${speed} ไฟล์/วินาที • เหลืออีก ~${remaining} วินาที`;
    }
  }
  
  // Animation เมื่อเสร็จ 100%
  if (percent === 100) {
    if (progressBar) {
      progressBar.style.background = 'linear-gradient(90deg, #4CAF50 0%, #66BB6A 100%)';
      progressBar.style.boxShadow = '0 0 20px rgba(76,175,80,0.8)';
    }
    if (progressInfo) {
      progressInfo.innerHTML = '<i class="fas fa-check-circle"></i> อัปโหลดสำเร็จ!';
    }
    if (uploadSpeed) {
      uploadSpeed.textContent = '';
    }
  }
}

function openModal(modalId) {
  const modal = document.getElementById(modalId);
  if (!modal) return;
  
  // ✅ บันทึกตำแหน่ง scroll ปัจจุบัน
  window.__savedScrollY = window.scrollY;
  
  // ✅ Lock body scroll แบบปลอดภัย
  document.body.style.top = `-${window.__savedScrollY}px`;
  document.body.style.position = 'fixed';
  document.body.style.width = '100%';
  document.body.style.overflow = 'hidden';
  document.body.classList.add('modal-open');
  
  modal.classList.add('active');
  
  // ✅ Scroll modal ไปด้านบน
  requestAnimationFrame(() => {
    modal.scrollTop = 0;
    const modalBody = modal.querySelector('.modal-body');
    if (modalBody) modalBody.scrollTop = 0;
  });

  // ✅ เปิด Drag & Drop เมื่อเปิด Modal เพิ่มเอกสาร
  if (modalId === 'addModal') {
    setTimeout(initDragAndDrop, 100);
  }
}

function closeModal(modalId) {
  const modal = document.getElementById(modalId);
  if (!modal) return;
  
  modal.classList.remove('active');
  
  // ✅ Unlock body scroll อย่างปลอดภัย
  document.body.classList.remove('modal-open');
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.width = '';
  document.body.style.overflow = '';
  
  // ✅ คืนตำแหน่ง scroll
  if (window.__savedScrollY) {
    window.scrollTo(0, window.__savedScrollY);
    window.__savedScrollY = null;
  }
}

// ===== FIX: Touch Scroll สำหรับ Modal (v2.0) =====
document.addEventListener('touchmove', function(e) {
  const modal = e.target.closest('.modal.active');
  if (!modal) return; // ไม่อยู่ใน modal = ไม่ทำอะไร
  
  // ✅ หา scrollable elements ทั้งหมด
  const scrollableSelectors = [
    '.modal-body',
    '.modal-content', 
    '#fileLinksContainer',
    '#viewModalBody',
    '.file-list-container',
    '[data-scrollable]'
  ];
  
  const isInsideScrollable = scrollableSelectors.some(selector => 
    e.target.closest(selector)
  );
  
  // ✅ อนุญาต scroll ถ้าอยู่ใน scrollable area
  if (isInsideScrollable) {
    return; // ไม่ block
  }
  
  // Block เฉพาะ background ของ modal
  if (e.target === modal) {
    e.preventDefault();
  }
}, { passive: false });


// ⭐ Auto-adjust modal height สำหรับ iOS keyboard
if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
  let initialHeight = window.innerHeight;
  
  window.addEventListener('resize', function() {
    const activeModal = document.querySelector('.modal.active');
    if (activeModal) {
      const modalContent = activeModal.querySelector('.modal-content');
      if (modalContent) {
        const currentHeight = window.innerHeight;
        
        // Keyboard is showing
        if (currentHeight < initialHeight * 0.8) {
          modalContent.style.height = currentHeight + 'px';
        } else {
          // Keyboard is hidden
          modalContent.style.height = '100vh';
          initialHeight = currentHeight;
        }
      }
    }
  });
}

// ⭐ Focus trap ใน Modal (สำหรับ accessibility)
function trapFocus(modal) {
  const focusableElements = modal.querySelectorAll(
    'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
  );
  
  if (focusableElements.length === 0) return;
  
  const firstElement = focusableElements[0];
  const lastElement = focusableElements[focusableElements.length - 1];
  
  modal.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      if (e.shiftKey) {
        // Shift + Tab
        if (document.activeElement === firstElement) {
          e.preventDefault();
          lastElement.focus();
        }
      } else {
        // Tab
        if (document.activeElement === lastElement) {
          e.preventDefault();
          firstElement.focus();
        }
      }
    }
    
    // ESC to close
    if (e.key === 'Escape') {
      closeModal(modal.id);
    }
  });
}

function getFileNameFromUrl(url) {
  try {
    const urlPath = url.split('?')[0];
    const pathParts = urlPath.split('/');
    const fileName = pathParts[pathParts.length - 1];
    return decodeURIComponent(fileName) || 'ไฟล์จาก URL';
  } catch (e) {
    return 'ไฟล์จาก URL';
  }
}

    const now = Date.now();

    if ((timeAway > 5000 || formSubmitTime) && !isAutoRefreshing) {
      isAutoRefreshing = true;

      // ไม่เรียก Swal.showLoading() เพื่อหลีกเลี่ยงสปินเนอร์ซ้อน

        // คืนค่าแฟล็ก/overlay
        suppressOverlay = false;

    }
  }

});

/**
 * ตรวจสอบประเภทสื่อ

function getMediaType(extension) {
  const mediaTypes = {
    // Video
    video: ['mp4', 'webm', 'ogg', 'mov', 'avi', 'mkv', 'wmv', 'm4v'],
    // Audio
    audio: ['mp3', 'wav', 'ogg', 'aac', 'm4a', 'flac'],
    // Image
    image: ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'],
    // PDF
    pdf: ['pdf'],
    // Document
    document: ['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'txt', 'csv']
  };
  
  for (const [type, extensions] of Object.entries(mediaTypes)) {
    if (extensions.includes(extension)) {
      return type;
    }
  }
  
  return 'unknown';
}

/**
 * แสดงเนื้อหาตามประเภท
 */
function renderMediaContent(container, fileUrl, fileName, mediaType, extension) {
  let html = '';
  
  switch (mediaType) {
    case 'video':
      html = `
        <video class="media-viewer-video" controls autoplay>
          <source src="${fileUrl}" type="video/${extension}">
          เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอ
        </video>
      `;
      break;
      
    case 'audio':
      html = `
        <div class="media-viewer-audio">
          <audio controls autoplay style="width: 100%;">
            <source src="${fileUrl}" type="audio/${extension}">
            เบราว์เซอร์ของคุณไม่รองรับการเล่นเสียง
          </audio>
        </div>
      `;
      break;
      
    case 'image':
      html = `
        <img class="media-viewer-image" src="${fileUrl}" alt="${escapeHtml(fileName)}">
      `;
      break;
      
    case 'pdf':
      html = `
        <iframe class="media-viewer-pdf" src="${fileUrl}"></iframe>
      `;
      break;
      
    case 'document':
    case 'unknown':
    default:
      const icon = getDocumentIconLarge(extension);
      html = `
        <div class="media-viewer-document">
          <div class="document-icon-large">${icon}</div>
          <div class="document-name">${escapeHtml(fileName)}</div>
          <div class="document-actions">
            <a href="${fileUrl}" download class="btn-download">
              <i class="fas fa-download"></i>
              ดาวน์โหลด
            </a>
            <a href="${fileUrl}" target="_blank" class="btn-open-new">
              <i class="fas fa-external-link-alt"></i>
              เปิดในแท็บใหม่
            </a>
          </div>
        </div>
      `;
      break;
  }
  
  container.innerHTML = html;
}

/**
 * ดึงไอคอนตามนามสกุลไฟล์
 */
function getDocumentIconLarge(extension) {
  const icons = {
    'pdf': '📕',
    'doc': '📘', 'docx': '📘',
    'xls': '📗', 'xlsx': '📗',
    'ppt': '📙', 'pptx': '📙',
    'txt': '📄',
    'zip': '📦', 'rar': '📦',
    'mp4': '🎬', 'mov': '🎬', 'avi': '🎬',
    'mp3': '🎵', 'wav': '🎵',
    'jpg': '🖼️', 'png': '🖼️'
  };
  
  return icons[extension] || '📁';
}

/**

document.addEventListener('DOMContentLoaded', function() {
